[content]
body = "You see the egg, and (immediately) look out for the cock (that is to be hatched from it); you see the bow, and (immediately) look out for the dove (that is to be brought down by it) being roasted.\n\nI will try to explain the thing to you in a rough way; do you in the same way listen to me.\n\n'How could any one stand by the side of the sun and moon, and hold under his arm all space and all time?\n\n(Such language only means that the sagely man) keeps his mouth shut, and puts aside questions that are uncertain and dark; making his inferior capacities unite with him in honouring (the One Lord).\n\nMen in general bustle about and toil; the p.\n\n194 sagely man seems stupid and to know nothing 1 .\n\nHe blends ten thousand years together in the one (conception of time); the myriad things all pursue their spontaneous course, and they are all before him as doing so.\n\n'How do I know that the love of life is not a delusion?\n\nand that the dislike of death is not like a young person's losing his way, and not knowing that he is (really) going home?\n\nLî Kî 2 was a daughter of the border Warden of Ai.\n\nWhen (the ruler of) the state of Zin first got possession of her, she wept till the tears wetted all the front of her dress.\n\nBut when she came to the place of the king 3 , shared with him his luxurious couch, and ate his grain-and-grass-fed meat, then she regretted that she had wept.\n\nHow do I know that the dead do not repent of their former craving for life?\n\n'Those who dream of (the pleasures of) drinking may in the morning wail and weep; those who dream of wailing and weeping may in the morning be going out to hunt.\n\nWhen they were dreaming they did not know it was a dream; in their dream they may even have tried to interpret it 4 ; but when they awoke they knew that it was a dream.\n\nAnd p.\n\n195 there is the great awaking, after which we shall know that this life was a great dream 1 .\n\nAll the while, the stupid think they are awake, and with nice discrimination insist on their knowledge; now playing the part of rulers, and now of grooms.\n\nBigoted was that Khiû!\n\nHe and you are both dreaming.\n\nI who say that you are dreaming am dreaming myself.\n\nThese words seem very strange; but if after ten thousand ages we once meet with a great sage who knows how to explain them, it will be as if we met him (unexpectedly) some morning or evening.\n\n10.\n\n'Since you made me enter into this discussion with you, if you have got the better of me and not I of you, are you indeed right, and I indeed wrong?\n\nIf I have got the better of you and not you of me, am I indeed right and you indeed wrong?\n\nIs the one of us right and the other wrong?\n\nare we both right or both wrong?\n\nSince we cannot come to a mutual and common understanding, men will certainly continue in darkness on the subject.\n\n'Whom shall I employ to adjudicate in the matter?\n\nIf I employ one who agrees with you, how can he, agreeing with you, do so correctly?\n\nAnd the same may be said, if I employ one who agrees with me.\n\nIt will be the same if I employ one who differs from us both or one who agrees with us both.\n\nIn this way I and you and those others would all not be able to come to a mutual understanding; and shall we then wait for that (great sage)?\n\n(We need not do so.) To wait on others to learn how conflicting opinions are changed is simply like not so p.\n\n196 waiting at all."

