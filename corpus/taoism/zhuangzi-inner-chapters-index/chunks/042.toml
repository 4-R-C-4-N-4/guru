[content]
body = "them untranslated, with the note, however, that they were 'l'abréviation de Thâi Shang Lâo Kün, expression honorifique par laquelle les Tâo-sze désignent Lâo-dze, le fondateur de leur secte 1 .' This is the interpretation commonly given of the phrase, and it is hardly worth while to indicate any doubt of its correctness; but if the characters were taken, as I believe they were, from the beginning of the seventeenth chapter of the Tâo Teh King, I should prefer to understand them of the highest and oldest form of the Tâoistic teaching 2 .\n\n3.\n\nI quoted on page 13 the view of Hardwick, the Christian Advocate of Cambridge, that 'the indefinite expression p.\n\n41 [paragraph continues] Tâo was adopted to denominate an abstract Cause, or the Was the old Tâoism a religion?\n\ninitial principle of life and order, to which worshippers were able to assign the attributes of immateriality, eternity, immensity, invisibility.' His selection of the term worshippers in this passage was unfortunate.\n\nNeither Lâo nor Kwang says anything about the worship of the Tâo, about priests or monks, about temples or rituals.\n\nHow could they do so, seeing that Tâo was not to them the name of a personal Being, nor 'Heaven' a metaphorical term equivalent to the Confucian Tî, 'Ruler,' or Shang Tî, 'Supreme Ruler.' With this agnosticism as to God, and their belief that by a certain management and discipline of the breath life might be prolonged indefinitely, I do not see how anything of an organised religion was possible for the old Tâoists.\n\nThe Tâoist proclivities of the founder of the Khin dynasty are well known.\n\nIf his life had been prolonged, and the dynasty become consolidated, there might have arisen such a religion in connexion with Tâoism, for we have a record that he, as head of the Empire, had eight spirits 1 to which he offered sacrifices.\n\nKhin, however, soon passed away; what remained in permanency from it was only the abolition of the feudal kingdom.\n\n4.\n\nWe cannot here attempt to relate in detail the rise and growth of the Kang family in which the headship of Tâoism has been hereditary since cur first Christian century, with the exception of one not very long interruption.\n\nThe family of Kang.\n\nOne of the earliest members of it, Kang Liang, must have been born not long after the death of Kwang-dze, for he joined the party of Liû p.\n\n42 [paragraph continues] Pang, the founder of the dynasty of Han, in B.\n\nC.\n\n208, and by his wisdom and bravery contributed greatly to his success over the adherents of Khin, and other contenders for the sovereignty of the empire.\n\nAbandoning then a political career, he spent the latter years of his life in a vain quest for the elixir of life.\n\nAmong Liang's descendants in our first century was a Kang Tâo-ling, who, eschewing a career in the service of the state, devoted himself to the pursuits of alchemy, and at last succeeded in compounding the grand elixir or pill, and at the age of 123 was released from the trammels of the mortal body, and entered on the enjoyment of immortality, leaving to his descendants his books, talismans and charms, his sword, mighty against spirits, and his seal."

