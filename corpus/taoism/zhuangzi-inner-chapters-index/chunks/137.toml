[content]
body = "The whole passage is perplexing to the reader to the last degree.\n\nThe remaining paragraphs are mostly occupied with instances of learning the Tâo, and of its effects in making men superior to the infirmities of age and the most terrible deformities of person and calamities of penury; as 'Tranquillity' under all that might seem most calculated to disturb it.\n\nVery strange is the attempt at the conclusion of par.\n\n8 apparently to trace the genesis of the knowledge of the Tâo.\n\nConfucius is introduced repeatedly as the expounder of Tâoism, and made to praise it as the ne plus ultra of human attainment.\n\nNext: Book VII.\n\nYing Tî Wang"

