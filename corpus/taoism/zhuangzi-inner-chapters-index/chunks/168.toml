body = "Sacred Texts Taoism Index Previous Next p.\n\n164 THE WRITINGS OF KWANG-DZE.\n\nBOOK I.\n\nPART I.\n\nSECTION I.\n\nHsiâo-yâo Yû, or 'Enjoyment in Untroubled Ease 1 .' 1.\n\nIn the Northern Ocean there is a fish, the name of which is Khwän 2 ,--I do not know how many lî in size.\n\nIt changes into a bird with the name of Phing, the back of which is (also)--I do not know how many lî in extent.\n\nWhen this bird rouses itself and flies, its wings are like clouds all round the sky.\n\nWhen the sea is moved (so as to bear it along), it prepares to remove to the Southern Ocean.\n\nThe Southern Ocean is the Pool of Heaven.\n\np.\n\n165 There is the (book called) Khî Hsieh 1 ,--a record of marvels.\n\nWe have in it these words:--'When the phäng is removing to the Southern Ocean it flaps (its wings) on the water for 3000 lî.\n\nThen it ascends on a whirlwind 90,000 lî, and it rests only at the end of six months.' (But similar to this is the movement of the breezes which we call) the horses of the fields, of the dust (which quivers in the sunbeams), and of living things as they are blown against one another by the air 2 .\n\nIs its azure the proper colour of the sky?\n\nOr is it occasioned by its distance and illimitable extent?\n\nIf one were looking down (from above), the very same appearance would just meet his view.\n\n2.\n\nAnd moreover, (to speak of) the accumulation of water;--if it be not great, it will not have strength to support a large boat.\n\nUpset a cup of water in a cavity, and a straw will float on it as if it were a boat.\n\nPlace a cup in it, and it will stick fast;--the water is shallow and the boat is large.\n\n(So it is with) the accumulation of wind; if it be not great, it will not have strength to support great wings.\n\nTherefore (the phäng ascended to) the height of 90,000 lî, and there was such a mass of wind beneath it; thenceforth the accumulation of wind was sufficient.\n\nAs it seemed to bear the blue sky on its back, and there was nothing to obstruct or arrest its course, it could pursue its way to the South.\n\np.\n\n166 A cicada and a little dove laughed at it, saying, 'We make an effort and fly towards an elm or sapan-wood tree; and sometimes before we reach it, we can do no more but drop to the ground.\n\nOf what use is it for this (creature) to rise 90,000 lî, and make for the South?' He who goes to the grassy suburbs 1 , returning to the third meal (of the day), will have his belly as full as when he set out; he who goes to a distance of 100 lî will have to pound his grain where he stops for the night; he who goes a thousand lî, will have to carry with him provisions for three months.\n\nWhat should these two small creatures know about the matter?\n\nThe knowledge of that which is small does not reach to that which is great; (the experience of) a few years does not reach to that of many.\n\nHow do we know that it is so?\n\nThe mushroom of a morning does not know (what takes place between) the beginning and end of a month; the short-lived cicada does not know (what takes place between) the spring and autumn.\n\nThese are instances of a short term of life."

