body = "Sacred Texts Taoism Index Previous Next p.\n\n176 BOOK II.\n\nPART I.\n\nSECTION II.\n\nKhî Wû Lun, or 'The Adjustment of Controversies 1 .' 1.\n\nNan-kwo Sze-khî 2 was seated, leaning forward on his stool.\n\nHe was looking up to heaven and breathed gently, seeming to be in a trance, and to have lost all consciousness of any companion.\n\n(His disciple), Yen Khäng Dze-yû 3 , who was in attendance and standing before him, said, 'What is this?\n\nCan the body be made to become thus like a withered tree, and the mind to become like slaked lime?\n\nHis appearance as he leans forward on the stool to-day is such as I never saw him have before in the same position.' Dze-khî said, 'Yen, you do well to ask such a question, I had just now lost myself 4 ; but how should you understand it?\n\nYou p.\n\n177 may have heard the notes 1 of Man, but have not heard those of Earth; you may have heard the notes of Earth, but have not heard those of Heaven.' Dze-yû said, 'I venture to ask from you a description of all these.' The reply was, 'When the breath of the Great Mass (of nature) comes strongly, it is called Wind.\n\nSometimes it does not come so; but when it does, then from a myriad apertures there issues its excited noise;--have you not heard it in a prolonged gale?\n\nTake the projecting bluff of a mountain forest;--in the great trees, a hundred spans round, the apertures and cavities are like the nostrils, or the mouth, or the ears; now square, now round like a cup or a mortar; here like a wet footprint, and there like a large puddle.\n\n(The sounds issuing from them are like) those of fretted water, of the arrowy whizz, of the stern command, of the inhaling of the breath, of the shout, of the gruff note, of the deep wail, of the sad and piping note.\n\nThe first notes are slight, and those that follow deeper, but in harmony with them.\n\nGentle winds produce a small response; violent winds a great one.\n\nWhen the fierce gusts have passed away, all the apertures p.\n\n178 are empty (and still);--have you not seen this in the bending and quivering of the branches and leaves?' Dze-yû said, 'The notes of Earth then are simply those which come from its myriad apertures; and the notes of Man may just be compared to those which (are brought from the tubes of) bamboo;--allow me to ask about the notes of Heaven 1 .' Dze-khî replied, 'When (the wind) blows, (the sounds from) the myriad apertures are different, and (its cessation) makes them stop of themselves.\n\nBoth of these things arise from (the wind and the apertures) themselves:--should there be any other agency that excites them?' 2.\n\nGreat knowledge is wide and comprehensive; small knowledge is partial and restricted.\n\nGreat speech is exact and complete; small speech is (merely) so much talk 2 .\n\nWhen we sleep, the soul communicates with (what is external to us); when we awake, the body is set free.\n\nOur intercourse with others then leads to various activity, and daily there is the striving of mind with mind.\n\nThere are hesitancies; deep difficulties; reservations; small apprehensions causing restless distress, and great p.\n\n179 apprehensions producing endless fears."

