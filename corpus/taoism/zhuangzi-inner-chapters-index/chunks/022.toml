body = "Sacred Texts Taoism Index Previous Next CHAPTER III.\n\nWHAT IS THE MEANING OF THE NAME TÂO?\n\nAND THE CHIEF POINTS OF BELIEF IN TÂOISM.\n\n1.\n\nThe first translation of the Tâo Teh King into a Western language was executed in Latin by some of the Meaning of the name Tâo.\n\nRoman Catholic missionaries, and a copy of it was brought to England by a Mr.\n\nMatthew Raper, F.\n\nR.\n\nS., and presented by him to the Society at a meeting on the 10th January, 1788,--being the gift to him of P.\n\nJos.\n\nde Grammont, 'Missionarius Apostolicus, ex-Jesuita.' In this version Tâo is taken in the sense of Ratio, or the Supreme Reason of the Divine Being, the Creator and Governor.\n\nM.\n\nAbel Rémusat, the first Professor of Chinese in Paris, does not seem to have been aware of the existence of the above version in London, but his attention was attracted to Lâo's treatise about 1820, and, in 1823, he wrote of the character Tâo, 'Ce mot me semble ne pas pouvoir être bien traduit, si ce n'est par le mot λόγος dans le triple sens de souverain Être, de raison, et de parole.' Rémusat's successor in the chair of Chinese, the late Stanislas Julien, published in 1842 a translation of the whole treatise.\n\nHaving concluded from an examination of it, and the earliest Tâoist writers, such as Kwang-dze, Ho-kwan Dze, and Ho-shang Kung, that the Tâo was devoid of action, of thought, of judgment, and of intelligence, he concluded that it was impossible to understand by it 'the Primordial Reason, or the Sublime Intelligence which created, and which governs the world,' and to p.\n\n13 this he subjoined the following note:--'Quelque étrange que puisse paraître cette idée de Lâo-dze, elle n'est pas sans exemple dans l'histoire de la philosophie.\n\nLe mot nature n'a-t-il pas été employé par certains philosophes, que la religion et la raison condamnent, pour désigner une cause première, également dépourvue de pensée et d'intelligence?' Julien himself did not doubt that Lâo's idea of the character was that it primarily and properly meant 'a way,' and hence he translated the title Tâo Teh King by 'Le Livre de la Voie et de la Vertu,' transferring at the same time the name Tâo to the text of his: version.\n\nThe first English writer who endeavoured to give a distinct account of Tâoism was the late Archdeacon Hardwick, while he held the office of Christian Advocate in the University of Cambridge.\n\nIn his 'Christ and other Masters' (vol.\n\nii, p.\n\n67), when treating of the religions of China, he says,': I feel disposed to argue that the centre of the system founded by Lâo-dze had been awarded to some energy or power resembling the \"Nature\" of modern speculators."

