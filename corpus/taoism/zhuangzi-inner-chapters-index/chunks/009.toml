[content]
body = "The Confucian element enters largely into all; and here, I think, an injustice has been done to Lâo-dze.\n\nTo a Confucianist the Tâoist system is in every sense of the word a heresy, and p.\n\nxvi a commentator holding this opinion is surely not the best expositor.\n\nIt is as a Grammarian rather than as a Philosopher that a member of the Jû Chiâ deals with the Tâo Teh King; he gives the sense of a passage according to the syntactical construction rather than according to the genius of the philosophy itself; and in attempting to explain the text by his own canons, instead of by the canons of Tâoism, he mistakes the superficial and apparently obvious meaning for the hidden and esoteric interpretation.' Mr.\n\nBalfour will hardly repeat his charge of imperfect or erroneous interpretation against Julien; and I believe that it is equally undeserved by most, if not all, of the other translators against whom it is directed.\n\nHe himself adopted as his guide the 'Explanations of the Tâo Teh King, 'current as the work of Lü Yen (called also Lü Zû, Lü Tung-pin, and Lü Khun-yang), a Tâoist of the eighth century.\n\nThrough Mr.\n\nBalfour's kindness I have had an opportunity of examining this edition of Lâo's Treatise; and I am compelled to agree with the very unfavourable judgment on it pronounced by Mr.\n\nGiles as both 'spurious' and' ridiculous.' All that we are told of Lü Yen is very suspicious; much of it evidently false.\n\nThe editions of our little book ascribed to him are many.\n\nI have for more than twenty years possessed one with the title of 'The Meaning of the Tâo Teh King Explained by the TRUE Man of Khun-yang,' being a reprint of 1690, and as different as possible from the work patronised by Mr.\n\nBalfour.\n\nFourth, the Thâi Shang Hwun Hsüan Tâo Teh Kän King,--a work of the present dynasty, published at Shanghai, but when produced I do not know.\n\nIt is certainly of the Lü Zü type, and is worth purchasing as one of the finest specimens of block-printing.\n\nIt professes to be the production of 'The Immortals of the Eight Grottoes,' each of whom is styled 'a Divine Ruler (Tï Kün).' The eighty-one chapters are equally divided for commentary among them, excepting that 'the Divine Ruler, the Universal Refiner,' has the last eleven assigned to him.\n\nThe Text is everywhere broken up into short clauses, which are explained in p.\n\nxvii a very few characters by 'God, the True Helper,' the same, I suppose, who is also styled, 'The Divine Ruler, the True Helper,' and comments at length on chapters 31 to 40.\n\nI mention these particulars as an illustration of how the ancient Tâoism has become polytheistic and absurd.\n\nThe name 'God, the True Helper,' is a title, I imagine, given to Lü Zû.\n\nWith all this nonsense, the composite commentary is a good one, the work, evidently, of one hand.\n\nOne of several recommendatory Prefaces is ascribed to Wân Khang, the god of Literature; and he specially praises the work, as explaining the meaning by examination of the Text.' Fifth, a 'Collection of the Most Important Treatises of the Tâoist Fathers (Tâo Zû Kän Kwan Kî Yâo).' This was reprinted in 1877 at Khang-kâu in Kiang-sû; beginning with the Tâo Teh King, and ending with the Kan Ying Phien."

