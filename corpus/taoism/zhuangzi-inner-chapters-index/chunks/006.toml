body = "Sacred Texts Taoism Index Previous Next p.\n\nix PREFACE.\n\nIN the Preface to the third volume of these 'Sacred Books of the East' (1879), I stated that I proposed giving in due course, in order to exhibit the System of Tâoism, translations of the Tâo Teh King by Lâo-Dze (sixth century B.C.), the Writings of Kwang-dze (between the middle of the fourth and third centuries B.C.), and the Treatise of Actions and their Retributions'(of our eleventh century); and perhaps also of one or more of the other characteristic Productions of the System.\n\nThe two volumes now submitted to the reader are a fulfilment of the promise made so long ago.\n\nThey contain versions of the Three Works which were specified, and, in addition, as Appendixes, four other shorter Treatises of Tâoism; Analyses of several of the Books of Kwang-dze by Lin Hsî-kung; a list of the stories which form so important a part of those Books; two Essays by two of the greatest Scholars of China, written the one in A.D.\n\n586 and illustrating the Tâoistic beliefs of that age, and the other in A.D.\n\n1078 and dealing with the four Books of Kwang-dze, whose genuineness is frequently called in question.\n\nThe concluding Index is confined very much to Proper Names.\n\nFor Subjects the reader is referred to the Tables of Contents, the Introduction to the Books of Kwang-dze (vol.\n\nXXXIX, pp.\n\n127-163), and the Introductory Notes to the various Appendixes.\n\nThe Treatise of Actions and their Retributions exhibits to us the Tâoism of the eleventh century in its moral or ethical aspects; in the two earlier Works we see it rather as a philosophical speculation than as a religion in the ordinary sense of that term.\n\nIt was not till after the introduction of Buddhism into China in our first century that Tâoism began to organise itself as a p.\n\nxii [paragraph continues] Religion, having its monasteries and nunneries, its images and rituals.\n\nWhile it did so, it maintained the superstitions peculiar to itself:--some, like the cultivation of the Tâo as a rule of life favourable to longevity, come down from the earliest times, and others which grew up during the decay of the Kâu dynasty, and subsequently blossomed;--now in Mystical Speculation; now in the pursuits of Alchemy; now in the search for the pills of Immortality and the Elixir vitae; now in Astrological fancies; now in visions of Spirits and in Magical arts to control them; and finally in the terrors of its Purgatory and everlasting Hell.\n\nIts phases have been continually changing, and at present it attracts our notice more as a degraded adjunct of Buddhism than as a development of the speculations of Lâo-dze and Kwang-dze.\n\nUp to its contact with Buddhism, it subsisted as an opposition to the Confucian system, which, while admitting the existence and rule of the Supreme Being, bases its teachings on the study of man's nature and the enforcement of the duties binding on all men from the moral and social principles of their constitution.\n\nIt is only during: the present century that the Texts of Tâoism have begun to receive the attention which they deserve.\n\nChristianity was introduced into China by Nestorian missionaries in the seventh century; and from the Hsî-an monument, which was erected by their successors in 781, nearly 150 years after their first entrance, we perceive that they were as familiar with the books of Lâo-dze and Kwang-dze as with the Confucian literature of the empire, but that monument is the only memorial of them that remains."

