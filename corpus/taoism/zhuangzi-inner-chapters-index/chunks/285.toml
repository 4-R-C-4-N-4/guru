[content]
body = "Within this range are comprehended all (the territories) which the five Tîs received in succession from one another; all which the royal founders of the three dynasties contended for; all which excited the anxiety of Benevolent men; and all which men in office have toiled for.\n\nPo-î was accounted famous for declining (to share in its government), and Kung-nî was accounted great because of the lessons which he addressed to it.\n\nThey acted as they did, making much of themselves;--therein like you who a little time ago did so of yourself because of your (volume of) water!' p.\n\n377 2.\n\nThe earl of the Ho said, 'Well then, may I consider heaven and earth as (the ideal of) what is great, and the point of a hair as that of what is small?' Zo of the Northern Sea replied, 'No.\n\nThe (different) capacities of things are illimitable; time never stops, (but is always moving on); man's lot is ever changing; the end and the beginning of things never occur (twice) in the same way.\n\nTherefore men of great wisdom, looking at things far off or near at hand, do not think them insignificant for being small, nor much of them for being great:--knowing how capacities differ illimitably.\n\nThey appeal with intelligence to things of ancient and recent occurrence, without being troubled by the remoteness of the former, or standing on tiptoe to lay hold of the latter:--knowing that time never stops in its course.\n\nThey examine with discrimination (cases of) fulness and of want, not overjoyed by success, nor disheartened by failure:--knowing the inconstancy of man's lot.\n\nThey know the plain and quiet path (in which things proceed), therefore they are not overjoyed to live, nor count it a calamity to die: the end and the beginning of things never occurring (twice) in the same way.\n\n'We must reckon that what men know is not so much as what they do not know, and that the time since they were born is not so long as that which elapsed before they were born.\n\nWhen they take that which is most small and try to fill with it the dimensions of what is most great, this leads to error and confusion, and they cannot attain their end.\n\nLooking at the subject in this way, how can you know that the point of a hair is sufficient to determine the minuteness of what is most small, or that p.\n\n378 heaven and earth are sufficient to complete the dimensions of what is most large?' 3.\n\nThe earl of the Ho said, 'The disputers of the world all say, \"That which is most minute has no bodily form; and that which is most great cannot be encompassed;\"--is this really the truth?' Zo of the Northern Sea replied, 'When from the standpoint of what is small we look at what is great, we do not take it all in; when from the standpoint of what is great we look at what is small, we do not see it clearly.\n\nNow the subtile essence is smallness in its extreme degree; and the vast mass is greatness in its largest form.\n\nDifferent as they are, each has its suitability,--according to their several conditions.\n\nBut the subtile and the gross both presuppose that they have a bodily form.\n\nWhere there is no bodily form, there is no longer a possibility of numerical division; where it is not possible to encompass a mass, there is no longer a possibility of numerical estimate.\n\nWhat can be discoursed about in words is the grossness of things; what can be reached in idea is the subtilty of things."

