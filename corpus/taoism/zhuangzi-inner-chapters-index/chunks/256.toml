[content]
body = "The first is (their fondness for) the five colours which disorder the eye, and take from it its (proper) clearness of vision; the second is (their fondness for) the five notes (of music), which disorder the ear and take from it its p.\n\n329 (proper) power of hearing; the third is (their fondness for) the five odours which penetrate the nostrils, and produce a feeling of distress all over the forehead; the fourth is (their fondness for) the five flavours, which deaden the mouth, and pervert its sense of taste; the fifth is their preferences and dislikes, which unsettle the mind, and cause the nature to go flying about.\n\nThese five things are all injurious to the life; and now Yang and Mo begin to stretch forward from their different standpoints, each thinking that he has hit on (the proper course for men).\n\nBut the courses they have hit on are not what I call the proper course.\n\nWhat they have hit on (only) leads to distress;--can they have hit on what is the right thing?\n\nIf they have, we may say that the dove in a cage has found the right thing for it.\n\nMoreover, those preferences and dislikes, that (fondness for) music and colours, serve but to pile up fuel (in their breasts); while their caps of leather, the bonnet with kingfishers' plumes, the memorandum tablets which they carry, and their long girdles, serve but as restraints on their persons.\n\nThus inwardly stuffed full as a hole for fuel, and outwardly fast bound with cords, when they look quietly round from out of their bondage, and think they have got all they could desire, they are no better than criminals whose arms are tied together, and their fingers subjected to the screw, or than tigers and leopards in sacks or cages, and yet thinking that they have got (all they could wish).\n\nFootnotes 307:1 See pp.\n\n143 , 144 .\n\n307:2 Implying that that ruler, 'the Son of Heaven,' is only one.\n\n307:3 'Heaven' is here defined as meaning 'Non-action, what is of itself ( );' the teh ( ) is the virtue, or qualities of the Tâo;--see the first paragraph of the next Book.\n\n307:4 This sentence gives the thesis, or subject-matter of the whole Book, which the author never loses sight of.\n\n307:5 Perhaps we should translate here, 'They looked at their words,' referring to 'the ancient rulers.' So Gabelentz construes:--'Dem Tâo gemäss betrachteten sie die reden.' The meaning that I have given is substantially the same.\n\nThe term 'words' occasions a difficulty.\n\nI understand it here, with most of the critics, as , the words of appellation.' 308:1 Meaning, probably, his appellation as Thien Dze, 'the Son of Heaven.' 308:2 That is, 'they responded to the Tâo,' without any constraint but the example of their rulers.\n\n308:3 Here there would seem to be a quotation which I have not been able to trace to its source.\n\n308:4 This 'Record' is attributed to Lâo-dze; but we know nothing of it.\n\nIn illustration of the sentiment in the sentence, the critics refer to par.\n\n34 in the fourth Appendix to the Yî King; but it is not to the point.\n\n309:1 Who is 'the Master' here?\n\nConfucius?\n\nor Lâo-dze?\n\nI think the latter, though sometimes even our author thus denominates Confucius;--see par.\n\n9.\n\n309:2 ?\n\nthe Tâo."

