[content]
body = "And I say that their methods were not the same.' Lâo Tan said, 'Come a little more forward, my son, and I will tell you how the Three Hwangs and the Five Tîs 1 ruled the world.\n\nHwang-Tî ruled it, so as to make the minds of the people all conformed to the One (simplicity).\n\nIf the parents of one of them died, and he did not wail, no one blamed him.\n\nYâo ruled it so as to cause the hearts of the people to cherish relative affection.\n\nIf any, however, made the observances on the death of other members of their kindred less than those for their parents, no one blamed them 2 .\n\nShun ruled it, so as to produce a feeling of rivalry in the minds of the people.\n\nTheir wives gave birth to their children in the tenth month of their pregnancy, but those children could speak at five months; and before they were three years old, they began to call people by their surnames and names.\n\nThen it was that men began to die prematurely.\n\nYü ruled it, so as to cause the minds of the people to become changed.\n\nMen's minds became scheming, and they p.\n\n360 used their weapons as if they might legitimately do so, (saying that they were) killing thieves and not killing other men.\n\nThe people formed themselves into different combinations;--so it was throughout the kingdom.\n\nEverywhere there was great consternation, and then arose the Literati and (the followers of) Mo (Tî).\n\nFrom them came first the doctrine of the relationships (of society); and what can be said of the now prevailing customs (in the marrying of) wives and daughters?\n\nI tell you that the rule of the Three Kings and Five Tîs may be called by that name, but nothing can be greater than the disorder which it produced.\n\nThe wisdom of the Three Kings was opposed to the brightness of the sun and moon above, contrary to the exquisite purity of the hills and streams below, and subversive of the beneficent gifts of the four seasons between.\n\nTheir wisdom has been more fatal than the sting of a scorpion or the bite of a dangerous beast 1 .\n\nUnable to rest in the true attributes of their nature and constitution, they still regarded themselves as sages:--was it not a thing to be ashamed of?\n\nBut they were shameless.' Dze-kung stood quite disconcerted and ill at ease.\n\n8.\n\nConfucius said to Lâo Tan, 'I have occupied myself with the Shih, the Shû, the Lî, the Yo, the Yî, and the Khun Khiû, those six Books, for what I myself consider a long time 2 , and am thoroughly p.\n\n361 acquainted with their contents.\n\nWith seventy-two rulers, all offenders against the right, I have discoursed about the ways of the former kings, and set forth the examples of (the dukes of Kâu and Shâo; and not one of them has adopted (my views) and put them in practice:--how very difficult it is to prevail on such men, and to make clear the path to be pursued!' Lâo-dze replied, 'It is fortunate that you have not met with a ruler fitted to rule the age.\n\nThose six writings are a description of the vestiges left by the former kings, but do not tell how they made such vestiges; and what you, Sir, speak about are still only the vestiges.\n\nBut vestiges are the prints left by the shoes;--are they the shoes that produced them?"

