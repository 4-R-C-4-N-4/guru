[content]
body = "Tâo-ling stands out, in Tâoist accounts, as the first patriarch of the system, with the title of Thien Shih, 'Master or Preceptor of Heaven.' Hsüan Zung of the Thang dynasty in 748, confirmed the dignity and title in the family; and in 1016 the Sung emperor Kän Zung invested its representative with large tracts of land near the Lung-hû mountain in Kiang-hsî.\n\nThe present patriarch--for I suppose the same man is still alive--made a journey from his residence not many years ago, and was interviewed by several foreigners in Shanghai.\n\nThe succession is said to be perpetuated by the transmigration of the soul of Kang Tâo-ling into some infant or youthful member of the family; whose heirship is supernaturally revealed as soon as the miracle is effected 1 .\n\nThis superstitious notion shows the influence of Buddhism on Tâoism.\n\nIt has been seen from the eighteenth of the Books of Kwang-dze what affinities there were between Influence of Buddhism on Tâoism.\n\nTâoism and the Indian system; and there can be no doubt that the introduction of the latter into China did more than anything else to affect the development of the Tâoistic system.\n\nAs early as the time of Confucius there were recluses in the country, men who had withdrawn from the world, disgusted with its p.\n\n43 vanities and in despair from its disorders.\n\nLâo would appear to have himself contemplated this course.\n\nWhen their representatives of our early centuries saw the Buddhists among them with their images, monasteries, and nunneries, their ritual and discipline, they proceeded to organise themselves after a similar fashion.\n\nThey built monasteries and nunneries, framed images, composed liturgies, and adopted a peculiar mode of tying up their hair.\n\nThe 'Three Precious Ones' of Buddhism, emblematic to the initiated of Intelligence personified in Buddha, the Law, and the Community or Church, but to the mass of the worshippers merely three great idols, styled by them Buddha Past, Present, and To Come: these appeared in Tâoism as the 'Three Pure Ones,' also represented by three great images, each of which receives the title of 'His Celestial Eminence,' and is styled the 'Most High God (Shang Tî).' The first of them is a deification of Chaos, the second, of Lâo-dze, and the third of I know not whom or what; perhaps of the Tâo.\n\nBut those Three Pure Ones have been very much cast into the shade, as the objects of popular worship and veneration, by Yü Hwang Tî or Yü Hwang Shang Tî.\n\nThis personage appears to have been a member of the Kang clan, held to be a magician and venerated from the time of the Thang dynasty, but deified in 1116 by the Sung emperor Hui Zung at the instigation of a charlatan Lin Ling-sû, a renegade Buddhist monk.\n\nHe is the god in the court of heaven to whom the spirits of the body and of the hearth in our treatise proceed at stated times to report for approval or condemnation the conduct of men.\n\nSince the first publication of the Kan Ying Phien, the tenets of Buddhism have been still further adopted by the teachers of Tâoism, and shaped to suit the nature of their own system.\n\nI have observed that the idea of retribution in our treatise does not go beyond the present life; but the manifestoes of Tâoism of more recent times are much occupied with descriptions of the courts of purgatory and threatenings of the everlasting misery of hell to those whom their sufferings in those courts p.\n\n44 fail to wean from their wickedness."

