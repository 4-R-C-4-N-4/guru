[content]
body = "He was a native, he tells us, of the territory of Mäng, which belonged to the kingdom of Liang or Wei, and held an office, he does not say what, in the city of Khî-yüan.\n\nKwang was thus of the same part of China as Lâo-dze, and probably grew up familiar with all his speculations and lessons.\n\nHe lived during the reigns of the kings Hui of Liang, Hsüan of Khî, and Wei of Khû.\n\nWe cannot be wrong therefore in assigning his period to the latter half of the third, and earlier part of the fourth century B.\n\nC.\n\nHe was thus a contemporary of Mencius.\n\nThey visited at the same courts, and yet neither ever mentions the other.\n\nThey were the two ablest debaters of their day, and fond of exposing what they deemed heresy.\n\nBut it would only be p.\n\n37 a matter of useless speculation to try to account for their never having come into argumentative collision.\n\nKhien says: 'Kwang had made himself well acquainted with all the literature of his time, but preferred the views of Lâo-dze, and ranked himself among his followers, so that of the more than ten myriads of characters contained in his published writings the greater part are occupied with metaphorical illustrations of Lâo's doctrines.\n\nHe made \"The Old Fisherman,\" \"The Robber Kih,\" and \"The Cutting open Satchels,\" to satirize and expose the disciples of Confucius, and clearly exhibit the sentiments of Lâo.\n\nSuch names and characters as \"Wei-lêi Hsü\" and \"Khang-sang Dze\" are fictitious, and the pieces where they occur are not to be understood as narratives of real events 1 .\n\n'But Kwang was an admirable writer and skilful composer, and by his instances and truthful descriptions hit and exposed the Mohists and Literati.\n\nThe ablest scholars of his day could not escape his satire nor reply to it, while he allowed and enjoyed himself with his sparkling, dashing style; and thus it was that the greatest men, even kings and princes, could not use him for their purposes.\n\n'King Wei of Khû, having heard of the ability of Kwang Kâu, sent messengers with large gifts to bring him to his court, and promising also that he would make him his chief minister.\n\nKwang-dze, however, only laughed and said to them, \"A thousand ounces of silver are a great gain to me, and to be a high noble and minister is a most honourable position.\n\nBut have you not seen the victim-ox for the border sacrifice?\n\nIt is carefully fed for several years, and robed with rich embroidery that it may be fit to enter the Grand Temple.\n\nWhen the time comes for it to do so, it would prefer to be a little pig, but it cannot get to be so.\n\nGo away quickly, and do not soil me with your presence.\n\np.\n\n38 I had rather amuse and enjoy myself in the midst of a filthy ditch than be subject to the rules and restrictions in the court of a sovereign.\n\nI have determined never to take office, but prefer the enjoyment of my own free will.\"' Khien concludes his account of Kwang-dze with the above story, condensed by him, probably, from two of Kwang's own narratives, in par.\n\n11 of Bk.\n\nXVII, and 13 of XXXII, to the injury of them both.\n\nParagraph 14 of XXXII brings before us one of the last scenes of Kwang-dze's life, and we may.\n\ndoubt whether it should be received as from his own pencil."

