[content]
body = "'Here,' said he, 'is this (young) man, whose natural disposition is as bad as it could be.\n\nIf I allow him to proceed in a bad way, it will be at the peril of our state; if I insist on his proceeding in a right way, it will be at the peril of my own person.\n\nHis wisdom is just sufficient to know the errors of other men, but he does not know how he errs himself What am I to do in such a case?' Kü Po-yü replied, 'Good indeed is your question!\n\nBe on your guard; be careful; see that you keep yourself correct!\n\nYour best plan will be, with your person to seek association with him, and with your mind to try to be in harmony with him; and yet there are dangers connected with both of these things.\n\nWhile seeking to keep near to him, do not enter into his pursuits; while cultivating a harmony of mind with him, do not show how superior you are to him.\n\nIf in your personal association you enter into his pursuits, you will fall with him and be ruined, you will tumbledown with a crash.\n\nIf in maintaining a harmony with his mind, you show how different you are from him, he will think you do so for the reputation and the name, and regard you as a creature of evil omen 3 .\n\nIf you find him to be a mere boy, be you with him as another boy; if you find him one of those who will not have their ground marked out in the ordinary way, do you humour p.\n\n216 him in this characteristic 1 ; if you find him to be free from lofty airs, show yourself to be the same;(ever) leading him on so as to keep him free from faults.\n\n'Do you not know (the fate of) the praying mantis?\n\nIt angrily stretches out its arms, to arrest the progress of the carriage, unconscious of its inability for such a task, but showing how much it thinks of its own powers.\n\nBe on your guard; be careful.\n\nIf you cherish a boastful confidence in your own excellence, and place yourself in collision with him, you are likely to incur the fate (of the mantis).\n\n'Do you not know how those who keep tigers proceed?\n\nThey do not dare to supply them with living creatures, because of the rage which their killing of them will excite.\n\nThey do not (even) dare to give them their food whole, because of the rage which their rending of it will excite.\n\nThey watch till their hunger is appeased, (dealing with them) from their knowledge of their natural ferocity.\n\nTigers are different from men, but they fawn on those who feed them, and do so in accordance with their nature.\n\nWhen any of these are killed by them, it is because they have gone against that nature.\n\n'Those again who are fond of horses preserve their dung in baskets, and their urine in jars.\n\nIf musquitoes and gadflies light on them, and the grooms brush them suddenly away, the horses break their bits, injure (the ornaments on) their heads, and smash those on their breasts.\n\nThe more care that is taken of them, the more does their fondness p.\n\n217 (for their attendants) disappear.\n\nOught not caution to be exercised (in the management of them)?' 6.\n\nA (master) mechanic, called Shih, on his way to Khî, came to Khü-yüan 1 , where he saw an oak-tree, which was used as the altar for the spirits of the land.\n\nIt was so large that an ox standing behind it could not be seen.\n\nIt measured a hundred spans round, and rose up eighty cubits on the hill before it threw out any branches, after which there were ten or so, from each of which a boat could be hollowed out."

