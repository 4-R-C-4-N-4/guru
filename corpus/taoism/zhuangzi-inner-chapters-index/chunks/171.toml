[content]
body = "Yâo ruled the people of the kingdom, and maintained a perfect government within the four seas.\n\nHaving gone to see the four (Perfect) Ones 3 on the distant hill of Kû-shih, when (he returned to his capital) on the south of the Fän water 4 , his throne appeared no more to his deep-sunk oblivious eyes 5 .\n\n7.\n\nHui-dze 6 told Kwang-dze, saying, 'The king of Wei 7 sent me some seeds of a large calabash, which I sowed.\n\nThe fruit, when fully grown, could contain five piculs (of anything).\n\nI used it to contain water, p.\n\n173 but it was so heavy that I could not lift it by myself.\n\nI cut it in two to make the parts into drinking vessels; but the dried shells were too wide and unstable and would not hold (the liquor); nothing but large useless things!\n\nBecause of their uselessness I knocked them to pieces.' Kwang-dze replied, 'You were indeed stupid, my master, in the use of what was large.\n\nThere was a man of Sung who was skilful at making a salve which kept the hands from getting chapped; and (his family) for generations had made the bleaching of cocoon-silk their business.\n\nA stranger heard of it, and proposed to buy the art of the preparation for a hundred ounces of silver.\n\nThe kindred all came together, and considered the proposal.\n\n\"We have,\" said they, \"been bleaching cocoon-silk for generations, and have only gained a little money.\n\nNow in one morning we can sell to this man our art for a hundred ounces;--let him have it.\" The stranger accordingly got it and went away with it to give counsel to the king of Wû 1 , who was then engaged in hostilities with Yüeh.\n\nThe king gave him the command of his fleet, and in the winter he had an engagement with that of Yüeh, on which he inflicted a great defeat 2 , and was invested with a portion of territory taken from Yüeh.\n\nThe keeping the hands from getting chapped was the same in both cases; but in the one case it led to the investiture (of the possessor of the salve), and p.\n\n174 in the other it had only enabled its owners to continue their bleaching.\n\nThe difference of result was owing to the different use made of the art.\n\nNow you, Sir, had calabashes large enough to hold five piculs;--why did you not think of making large bottle-gourds of them, by means of which you could have floated over rivers and lakes, instead of giving yourself the sorrow of finding that they were useless for holding anything.\n\nYour mind, my master, would seem to have been closed against all intelligence!' Hui-dze said to Kwang-dze, 'I have a large tree, which men call the Ailantus 1 .\n\nIts trunk swells out to a large size, but is not fit for a carpenter to apply his line to it; its smaller branches are knotted and crooked, so that the disk and square cannot be used on them.\n\nThough planted on the wayside, a builder would not turn his head to look at it.\n\nNow your words, Sir, are great, but of no use;--all unite in putting them away from them.' Kwang-dze replied, 'Have you never seen a wildcat or a weasel?\n\nThere it lies, crouching and low, till the wanderer approaches; east and west it leaps about, avoiding neither what is high nor what is low, till it is caught in a trap, or dies in a net.\n\nAgain there is the Yak 2 , so large that it is like a cloud hanging in the sky.\n\nIt is large indeed, but it cannot catch mice."

