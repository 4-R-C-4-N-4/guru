body = "Sacred Texts Taoism Index Previous Next p.\n\n368 BOOK XVI.\n\nPART II.\n\nSECTION IX.\n\nShan Hsing, or 'Correcting the Nature 1 .' 1.\n\nThose who would correct their nature by means of the vulgar learning 2 , seeking to restore it to its original condition, and those who would regulate 3 their desires, by the vulgar ways of thinking, seeking thereby to carry their intelligence to perfection, must be pronounced to be deluded and ignorant people.\n\nThe ancients who regulated the Tâo nourished their faculty of knowledge by their placidity, and all through life abstained from employing that faculty in action;--they must be pronounced to have (thus also) nourished their placidity by their knowledge 4 .\n\nWhen the faculty of knowledge and the placidity p.\n\n369 (thus) blend together, and they nourish each other, then from the nature there come forth harmony and orderly method.\n\nThe attributes (of the Tâo) constitute the harmony; the Tâo (itself) secures the orderly method.\n\nWhen the attributes appear in a universal practice of forbearance, we have Benevolence; when the path is all marked by orderly method, we have Righteousness; when the righteousness is clearly manifested, and (all) things are regarded with affection, we have Leal-heartedness; when the (heart's) core is thus (pure) and real, and carried back to its (proper) qualities, we have Music; when this sincerity appears in all the range of the capacity, and its demonstrations are in accordance with what is elegant, we have Ceremony.\n\nIf Ceremonies and Music are carried out in an imperfect and one-sided manner, the world is thrown into confusion.\n\nWhen men would rectify others, and their own virtue is beclouded, it is not sufficient to extend itself to them.\n\nIf an attempt be made so to extend it, they also will lose their (proper) nature.\n\n2.\n\nThe men of old, while the chaotic condition was yet undeveloped 1 , shared the placid tranquillity which belonged to the whole world.\n\nAt that time the Yin and Yang were harmonious and still; their resting and movement proceeded without any disturbance; the four seasons had their definite times; not a single thing received any injury, and no living being came to a premature end.\n\nMen might be p.\n\n370 possessed of (the faculty of) knowledge, but they had no occasion for its use.\n\nThis was what is called the state of Perfect Unity.\n\nAt this time, there was no action on the part of any one, but a constant manifestation of spontaneity.\n\nThis condition (of excellence) deteriorated and decayed, till Sui-zän and Fû-hsî arose and commenced their administration of the world 1 ; on which came a compliance (with their methods), but the state of unity was lost.\n\nThe condition going on to deteriorate and decay, Shän Näng and Hwang-Tî arose, and took the administration of the world, on which (the people) rested (in their methods), but did not themselves comply with them.\n\nStill the deterioration and decay continued till the lords of Thang and Yü 2 began to administer the world.\n\nThese introduced the method of governing by transformation, resorting to the stream (instead of to the spring) 3 , thus vitiating the purity and destroying the simplicity (of the nature).\n\nThey left the Tâo, and substituted the Good for it, and pursued the course of Haphazard Virtue.\n\nAfter this they forsook their nature and followed (the promptings of) their minds.\n\nOne mind and another associated their knowledge, but were unable to give rest to the world.\n\nThen they added to this knowledge (external p.\n\n371 and) elegant forms, and went on to make these more and more numerous."

