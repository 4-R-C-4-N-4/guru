[content]
body = "5, again, the mystical Yûn-kiang is made to say to the equally fabulous and mystical Hung-mung, 'O Heaven, have you forgotten me?' and, farther on, 'O Heaven, you have conferred on me (the knowledge of) your operation, and revealed to me the mystery of it;' in both which passages Mr.\n\nGiles renders thien by 'your Holiness.' But Mr.\n\nGiles seems to agree with me that the old Tâoists had no idea of a personal God, when they wrote of Mr.\n\nGiles's own ideal of the meaning of the name 'God' as the equivalent of Thien.\n\nThien or Heaven.\n\nOn his sixty-eighth page, near the beginning of Book VI, we meet with the following sentence, having every appearance of being translated from the Chinese text:--'God is a principle which exists by virtue of its own intrinsicality, and operates without self-manifestation.' By an inadvertence he has introduced his own definition of 'God' as if it were Kwang-dze's; and though I can find no characters in the text of which I can suppose that he intends it to be the translation, it is valuable as helping us to understand the meaning to be attached to the Great Name in his volume.\n\nI have referred above (p.\n\n16) to the only passage in Lâo's treatise, where he uses the name Tî or God in its The relation of the Tâo to Tî.\n\nhighest sense, saying that 'the Tâo might seem to have been before Him.' He might well say so, for in his first chapter be describes the Tâo, '(conceived of as) having no name, as the Originator of heaven and p.\n\n19 earth, and (conceived of as) having a name, as the Mother of all things.' The reader will also find the same predicates of the Tâo at greater length in his fifty-first chapter.\n\nThe character Tî is also of rare occurrence in Kwang-dze, excepting as applied to the five ancient Tîs.\n\nIn Bk.\n\nIII, par.\n\n4, and in one other place, we find it indicating the Supreme Being, but the usage is ascribed to the ancients.\n\nIn Bk.\n\nXV, par, 3, in a description of the human SPIRIT, its name is said to be 'Thung Tî,' which Mr.\n\nGiles renders 'Of God;' Mr.\n\nBalfour, 'One with God;' while my own version is 'The Divinity in Man.' In Bk.\n\nXII, par.\n\n6, we have the expression 'the place of God;' in Mr.\n\nGiles, 'the kingdom of God;' in Mr.\n\nBalfour, 'the home of God.' In this and the former instance, the character seems to be used with the ancient meaning which had entered into the folklore of the people.\n\nBut in Bk.\n\nVI, par.\n\n7, there is a passage which shows clearly the relative position of Tâo and Tî in the Tâoistic system; and having called attention to it, I will go on to other points.\n\nLet the reader mark well the following predicates of the Tâo:--'Before there were heaven and earth, from of old, there It was, securely existing.\n\nFrom It came the mysterious existence of spirits; from It the mysterious existence of Tî (God).\n\nIt produced heaven, It produced earth 1 .' This says more than the utterance of Lâo,--that 'the Tâo seemed to be before God;'--does it not say that Tâo was before God, and that He was what He is by virtue of Its operation?\n\n3.\n\nAmong the various personal names given to the Tâo No idea of Creation proper in Tâoism."

