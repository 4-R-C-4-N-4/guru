body = "It conducts nothing and anticipates nothing; it responds to (what is before it), but does not retain it.\n\nThus he is able to deal successfully with all things, and injures none.\n\n7.\n\nThe Ruler 3 of the Southern Ocean was Shû 4 , the p.\n\n267 Ruler of the Northern Ocean was Hû 1 , and the Ruler of the Centre was Chaos.\n\nShû and Hû were continually meeting in the land of Chaos, who treated them very well.\n\nThey consulted together how they might repay his kindness, and said, 'Men all have seven orifices for the purpose of seeing, hearing, eating, and breathing, while this (poor) Ruler alone has not one.\n\nLet us try and make them for him.' Accordingly they dug one orifice in him every day; and at the end of seven days Chaos died 2 .\n\nFootnotes 259:1 See pp.\n\n136 - 138 .\n\n259:2 See p.\n\n190, note 5 .\n\n259:3 An ancient Tâoist, of the time of Shun.\n\nSo, Hwang-fû Mî, who adds that Shun served him as his master when he was eight years old.\n\nI suppose the name indicates that his clothes were made of rushes.\n\n259:4 Shun.\n\nSee p.\n\n245, note 3 .\n\n259:5 An ancient sovereign, earlier, no doubt, than Fû-hsî; but nothing is known of him.\n\n259:6 He thought nothing about his being, as a man, superior to the lower creatures.\n\nShun in governing employed his acquired knowledge; Thâi had not begun to do so.\n\n260:1 See p.\n\n170, note 2 .\n\n260:2 See p.\n\n170, note 3 .\n\n260:3 A name;--'a worthy,' it is said.\n\n260:4 Name of some hill, or height.\n\n260:5 A name ('Root of the sky'), but probably mythical.\n\nThere is a star so called.\n\n260:6 Probably the name of a mountain, though this meaning of Yin is not given in the dictionary.\n\n261:1 Or, 'a nameless man.' We cannot tell whether Kwang-dze had any particular Being, so named, in view or not.\n\n261:2 The objectionable point in the question is the supposition that doing' was necessary in the case.\n\n261:3 Or, 'I am unprepared!\n\nBut as Thien Kän repeats the question, it seems better to supply the second pronoun.\n\nHe had thought on the subject.\n\n261:4 See the same phraseology in VI, par.\n\n11.\n\nWhat follows is merely our author's way of describing the non-action of the Tâo.\n\n261:5 The Yang Kû, whom Mencius attacked so fiercely.\n\nHe was, perhaps, a contemporary and disciple of Lâo-dze.\n\n262:1 The may be taken as = in which case we must understand a as its object; or as = , an echo,' indicating the quickness of the man's response to things.\n\n262:2 Compare the language of Lâo Tan, in Bk.\n\nXII, par.\n\n8, near the beginning.\n\n262:3 is generally feminine, meaning 'a witch.' We must take p.\n\n263 it here as masculine (= ).\n\nThe general meaning of the character is 'magical,' the antics of such performers to bring down the spirits.\n\n263:1 Literally, 'intoxicated.' 263:2 The teacher in Tâoism of Lieh-dze, called also Hû Khiû, with the name Lin ( ).\n\nSee the remarks on the whole paragraph in the Introductory Notice of the Book.\n\n263:3 'The hens' signify the letter of the doctrine; 'the cock,' its spirit; 'the eggs,' a real knowledge of it."

