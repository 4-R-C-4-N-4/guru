body = "383 cannot be arrested.\n\nDecay and growth, fulness and emptiness, when they end, begin again.\n\nIt is thus that we describe the method of great righteousness, and discourse about the principle pervading all things.\n\nThe life of things is like the hurrying and galloping along of a horse.\n\nWith every movement there is a change; with every moment there is an alteration.\n\nWhat should you be doing?\n\nwhat should you not be doing?\n\nYou have only to be allowing this course of natural transformation to be going on.' 7.\n\nThe earl of the Ho said, 'What then is there so valuable in the Tâo?' Zo of the Northern Sea replied, 'He who knows the Tâo, is sure to be well acquainted with the principles (that appear in the procedures of things).\n\nAcquainted with (those) principles, he is sure to understand how to regulate his conduct in all varying circumstances.\n\nHaving that understanding, he will not allow things to injure himself.\n\nFire cannot burn him who is (so) perfect in virtue, nor water drown him; neither cold nor heat can affect him injuriously; neither bird nor beast can hurt him.\n\nThis does not mean that he is indifferent to these things; it means that he discriminates between where he may safely rest and where he will be in peril; that he is tranquil equally in calamity and happiness; that he is careful what he avoids and what he approaches;--so that nothing can injure him.\n\nHence it is said, \"What is heavenly is internal; what is human is external.\" The virtue (of man) is in what is Heavenly.\n\nIf you know the operation of what is Heavenly and what is Human, you will have your root in what is Heavenly and your position in Virtue.\n\nYou will bend or stretch p.\n\n384 (only) after the (necessary) hesitation; you will have returned to the essential, and may be pronounced to have reached perfection.' 'What do you mean,' pursued the earl, 'by the Heavenly, and by the Human?' Zo replied, 'Oxen and horses have four feet;--that is what I call their Heavenly (constitution).\n\nWhen horses' heads are haltered, and the noses of oxen are pierced, that is what I call (the doing of) Man.\n\nHence it is said, \"Do not by the Human (doing) extinguish the Heavenly (constitution); do not for your (Human) purpose extinguish the appointment (of Heaven); do not bury your (proper) fame in (such) a pursuit of it; carefully guard (the Way) and do not lose it:--this is what I call reverting to your True (Nature).\"' 8.\n\nThe khwei 1 desires to be like 2 the millipede 1 ; the millipede to be like the serpent; the serpent like the wind; the wind to be like the eye; and the eye to be like the mind 3 .\n\nThe khwei said to the millipede, 'With my one leg I hop about, and can hardly manage to go along.\n\nNow you have a myriad feet which you can employ; how is it that you are so abundantly furnished?' The millipede said, 'It is not so.\n\nHave you not seen one ejecting saliva?\n\nThe largest portion of it is like a pearl, while the smaller portions fall down like a shower of mist in innumerable p.\n\n385 drops.\n\nNow I put in motion the springs set in me by Heaven, without knowing how I do so.' The millipede said to the serpent, 'I go along by means of my multitude of feet; and yet how is it that I do not go so fast as you who have no feet at all?' The serpent replied, 'How can the method of moving by the springs set in us by Heaven be changed?"

