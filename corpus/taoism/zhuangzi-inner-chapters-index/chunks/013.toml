[content]
body = "It contains many extracts from Ko Hung (Introduction, p.\n\n5, note), to whom he always refers by his nom d e plume of Pao-phoh Dze, or 'Maintainer of Simplicity.' He considers indeed this Tractate to have originated from him.\n\nI have thus set forth all that is necessary to be said here by way of preface.\n\nFor various information about the Treatises comprised in the Appendixes, the reader is referred to the preliminary notes, which precede the translation of most of them.\n\nI have often sorely missed the presence of a competent native scholar who would have assisted me in the quest of references, and in talking over difficult passages.\n\nSuch a helper would have saved me much time; but the result, I think, would scarcely have appeared in any great alteration of my versions.\n\nJ.L.\n\nOXFORD, December 20, 1890.\n\nNext: Chapter I: Was Taoism Older Than Lao-Dze?"

