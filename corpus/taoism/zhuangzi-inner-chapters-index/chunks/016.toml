body = "Sacred Texts Taoism Index Previous Next CHAPTER II.\n\nTHE TEXTS OF THE TAO TEH KING AND KWANG SZE SHÛ, AS REGARDS THEIR AUTHENTICITY AND GENUINENESS, AND THE ARRANGEMENT OF THEM.\n\nI.\n\n1.\n\nI will now state briefly, first, the grounds on which I accept the Tâo Teh King as a genuine production of the age to which it has been assigned, and the truth of its authorship by Lâo-dze to whom it has been ascribed.\n\nIt would not have been necessary a few years ago to write as if these points could be called in question, but in 1886 Mr.\n\nHerbert A.\n\nGiles, of Her Majesty's Consular Service in China, and one of the ablest Chinese scholars living, vehemently called them in question in an article in the China Review for the months of March and April.\n\nHis strictures have been replied to, and I am not going to revive here the controversy which they produced, but only to state a portion of the evidence which satisfies my own mind on the two points just mentioned.\n\n2.\n\nIt has been said above that the year B.\n\nC.\n\n604 was, probably, that of Lâo-dze's birth.\n\nThe year of his death is not recorded.\n\nSze-mâ Khien, the first great Chinese historian, The evidence of Sze-mâ Khien, the historian.\n\nwho died in about B.C.\n\n85, commences his 'Biographies' with a short account of Lâo-dze.\n\nHe tells us that the philosopher had been a curator of the Royal Library of Kâu, and that, mourning over the decadence of the dynasty, he wished to withdraw from the world, and proceeded to the pass or defile of Hsien-ku 1 , p.\n\n5 leading from China to the west.\n\nThere he was recognised by the warden of the pass, Yin Hsî (often called Kwan Yin), himself a well-known Tâoist, who insisted on his leaving him a writing before he went into seclusion.\n\nLâo-dze then wrote his views on 'The Tâo and its Characteristics,' in two parts or sections, containing more than 5000 characters, gave the manuscript to the warden, and went his way 1 ; 'nor is it known where he died.' This account is strange enough, and we need not wonder that it was by and by embellished with many marvels.\n\nIt contains, however, the definite statements that Lâo-dze wrote the Tâo Teh King in two parts, and consisting of more than 5000 characters.\n\nAnd that Khien was himself well acquainted with the treatise is apparent from his quotations from it, with, in almost every case, the specification of the author.\n\nHe thus adduces part of the first chapter, and a large portion of the last chapter but one.\n\nHis brief references also to Lâo-dze and his writings are numerous.\n\n3.\n\nBut between Lâo-dze and Sze-mâ Khien there were many Tâoist writers whose works remain.\n\nI may specify Lieh-dze, Han Fei-dze, and other Tâoist authors.\n\nLieh-dze (assuming that his chapters, though not composed in their present form by him, may yet be accepted as fair specimens of his teaching); Kwang-dze (of the fourth century B.C.\n\nWe find him refusing to accept high office from king Wei of Khû, B.C.\n\n339-299); Han Fei, a voluminous author, who died by his own hand in B.C."

