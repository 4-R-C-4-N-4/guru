body = "Sacred Texts Taoism Index Previous Next p.\n\n268 BOOK VIII.\n\nPART II.\n\nSECTION I.\n\nPhien Mâu, or 'Webbed Toes 1 .' 1.\n\nA ligament uniting the big toe with the other toes and an extra finger may be natural 2 growths, but they are more than is good for use.\n\nExcrescences on the person and hanging tumours are growths from the body, but they are unnatural additions to it.\n\nThere are many arts of benevolence and righteousness, and the exercise of them is distributed among the five viscera 3 ; but this is not the correct method according to the characteristics of the Tâo.\n\nThus it is that the addition to the foot is but the attachment to it of so much useless flesh, and the addition to the hand is but the planting on it of a useless finger.\n\n(So it is that) the connecting (the virtues) with the five viscera renders, by excess or restraint, the action of benevolence and righteousness bad, and leads to many arts as in the employment of (great) powers of hearing or of vision.\n\n2.\n\nTherefore an extraordinary power of vision p.\n\n269 leads to the confusion of the five colours 1 and an excessive use of ornament.\n\n(Its possessor), in the resplendence of his green and yellow, white and black, black and green, will not stop till he has become a Lî Kû 2 .\n\nAn extraordinary power of hearing leads to a confusion of the five notes 3 , and an excessive use of the six musical accords 4 .\n\n(Its possessor), in bringing out the tones from the instruments of metal, stone, silk, and bamboo, aided by the Hwang-kung 4 and Tâ-lü 4 (tubes), will not stop till he has become a Shih Khwang 5 .\n\n(So), excessive benevolence eagerly brings out virtues and restrains its (proper) nature, that (its possessor) may acquire a famous reputation, and cause all the organs and drums in the world to celebrate an unattainable condition; and he will not stop till he has become a Zäng (Shän) 6 or a Shih (Zhiû) 7 .\n\nAn extraordinary p.\n\n270 faculty in debating leads to the piling up of arguments like a builder with his bricks, or a net-maker with his string.\n\n(Its possessor) cunningly contrives his sentences and enjoys himself in discussing what hardness is and what whiteness is, where views agree and where they differ, and pressing on, though weary, with short steps, with (a multitude of) useless words to make good his opinion; nor will he stop till he has become a Yang (Kû) 1 or Mo (Tî) 1 .\n\nBut in all these cases the parties, with their redundant and divergent methods, do not proceed by that which is the correct path for all under the sky.\n\nThat which is the perfectly correct path is not to lose the real character of the nature with which we are endowed.\n\nHence the union (of parts) should not be considered redundance, nor their divergence superfluity; what is long should not be considered too long, nor what is short too short.\n\nA duck's legs, for instance, are short, but if we try to lengthen them, it occasions pain; and a crane's legs are long, but if we try to cut off a portion of them, it produces grief.\n\nWhere a part is by nature long, we are not to amputate, or where it is by nature short, we are not to lengthen it.\n\nThere is no occasion to try to remove any trouble that it may cause.\n\n3."

