body = "Sacred Texts Taoism Index Previous Next 52.\n\n52.\n\n1.\n\n(The Tâo) which originated all under the sky is to be considered as the mother of them all.\n\np.\n\n95 2.\n\nWhen the mother is found, we know what her children should be.\n\nWhen one knows that he is his mother's child, and proceeds to guard (the qualities of) the mother that belong to him, to the end of his life he will be free from all peril.\n\n3.\n\nLet him keep his mouth closed, and shut up the portals (of his nostrils), and all his life he will be exempt from laborious exertion.\n\nLet him keep his mouth open, and (spend his breath) in the promotion of his affairs, and all his life there will be no safety for him.\n\n4.\n\nThe perception of what is small is (the secret of) clear-sightedness; the guarding of what is soft and tender is (the secret of) strength.\n\n5.\n\nWho uses well his light, Reverting to its (source so) bright, Will from his body ward all blight, And hides the unchanging from men's sight.\n\n, 'Returning to the Source.' The meaning of the chapter is obscure, and the commentators give little help in determining it.\n\nAs in the preceding chapter, Lâo-dze treats of the operation of the Tâo on material things, he seems in this to go on to the operation of it in man, or how he, with his higher nature, should ever be maintaining it in himself.\n\nFor the understanding of paragraph 1 we must refer to the first chapter of the treatise, where the Tâo, 'having no name,' appears as 'the Beginning' or 'First Cause' of the world, and then, 'having a name,' as its 'Mother.' It is the same thing or concept in both of its phases, the ideal or absolute, and the manifestation of it in its passionless doings.\n\nThe old Jesuit translators render this par.\n\nby 'Mundus principium et causam suam habet in Divino , seu actione Divinae sapientiae quae dici potest ejus mater.' So far I may assume that they agreed with me in understanding that the subject of the par.\n\nwas the Tâo.\n\np.\n\n96 Par.\n\n2 lays down the law of life for man thus derived from the Tâo.\n\nThe last clause of it is given by the same translators as equivalent to 'Unde fit ut post mortem nihil ei timendum sit,'--a meaning which the characters will not bear.\n\nBut from that clause, and the next par., I am obliged to conclude that even in Lâo-dze's mind there was the germ of the sublimation of the material frame which issued in the asceticism and life-preserving arts of the later Tâoism.\n\nPar.\n\n3 seems to indicate the method of 'guarding the mother in man,' by watching over the breath, the proto-plastic 'one' of ch.\n\n42, the ethereal matter out of which all material things were formed.\n\nThe organs of this breath in man are the mouth and nostrils (nothing else should be understood here by and ;--see the explanations of the former in the last par.\n\nof the fifth of the appendixes to the Yî in vol.\n\nxvi, p.\n\n432); and the management of the breath is the mystery of the esoteric Buddhism and Tâoism.\n\nIn par.\n\n4 'The guarding what is soft' is derived from the use of 'the soft lips' in hiding and preserving the hard and strong teeth.\n\nPar."

