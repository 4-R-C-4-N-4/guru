[content]
body = "If it were easy to make my parents forget me, it is difficult for me to forget all men in the world.\n\nIf it were easy to forget all men in the world, it is difficult to make them all forget me.\" 'This virtue might make one think light of Yâo and Shun, and not wish to be they 5 .\n\nThe profit p.\n\n348 and beneficial influences of it extend to a myriad ages, and no one in the world knows whence they come.\n\nHow can you simply heave a great sigh, and speak (as you do) of benevolence and filial duty?\n\nFilial duty, fraternal respect, benevolence, righteousness, loyalty, sincerity, firmness, and purity;--all these may be pressed into the service of this virtue, but they are far from sufficient to come up to it.\n\nTherefore it is said, \"To him who has what is most noble 1 , all the dignities of a state are as nothing 2 ; to him who has what is the greatest riches, all the wealth of a state is as nothing; to him who has all that he could wish, fame and praise are as nothing.\" It is thus that the Tâo admits of no substitute.' 3.\n\nPei-män Khäng 3 asked Hwang-Tî, saying, 'You were celebrating, O Tî, a performance of the music of the Hsien-khih 4 , in the open country near the Thung-thing lake.\n\nWhen I heard the first part of it, I was afraid; the next made me weary; and the last perplexed me.\n\nI became agitated and unable to speak, and lost my self-possession.' The Tî said, 'It was likely that it should so affect you!\n\nIt was performed with (the instruments of) men, and all attuned according to (the influences of) Heaven.\n\nIt p.\n\n349 proceeded according to (the principles of) propriety and righteousness, and was pervaded by (the idea of) the Grand Purity.\n\n'The Perfect Music first had its response in the affairs of men, and was conformed to the principles of Heaven; it indicated the action of the five virtues, and corresponded to the spontaneity (apparent in nature).\n\nAfter this it showed the blended distinctions of the four seasons, and the grand harmony of all things;--the succession of those seasons one after another, and the production of things in their proper order.\n\nNow it swelled, and now it died away, its peaceful and military strains clearly distinguished and given forth.\n\nNow it was clear, and now rough, as if the contracting and expanding of the elemental processes blended harmoniously (in its notes).\n\nThose notes then flowed away in waves of light, till, as when the hibernating insects first begin to move, I commanded the terrifying crash of thunder.\n\nIts end was marked by no formal conclusion, and it began again without any prelude.\n\nIt seemed to die away, and then it burst into life; it came to a close, and then it rose again.\n\nSo it went on regularly and inexhaustibly, and without the intervention of any pause:--it was this which made you afraid.\n\n'In the second part (of the performance), I made it describe the harmony of the Yin and Yang, and threw round it the brilliance of the sun and moon.\n\nIts notes were now short and now long, now soft and now hard.\n\nTheir changes, however, were marked by an unbroken unity, though not dominated by a fixed regularity.\n\nThey filled every valley and ravine; you might shut up every crevice, and guard your spirit (against their entrance), yet p.\n\n350 there was nothing but gave admission to them.\n\nYea, those notes resounded slowly, and might have been pronounced high and clear."

