body = "Sacred Texts Taoism Index Previous Next p.\n\n203 BOOK IV.\n\nPART I.\n\nSECTION IV.\n\nZän Kien Shih, or 'Man in the World, Associated with other Men 1 .' 1.\n\nYen Hui 2 went to see Kung-nî 3 , and asked leave to take his departure.\n\n'Where are you going to?' asked the Master.\n\n'I will go to Wei 4 ' was the reply.\n\n'And with what object?' 'I have heard that the ruler of Wei 5 is in the vigour of his years, and consults none but himself as to his course.\n\nHe deals with his state as if it were a light matter, and has no perception of his errors.\n\nHe thinks lightly of his people's dying; the dead are lying all over the country as if no smaller space could contain them; on the plains 6 and about the marshes, they are as thick as heaps of fuel.\n\nThe people know not where to turn to.\n\nI have heard you, Master, say, \"Leave the state that is well p.\n\n204 governed; go to the state where disorder prevails 1 .\" At the door of a physician there are many who are ill.\n\nI wish through what I have heard (from you) to think out some methods (of dealing with Wei), if peradventure the evils of the state may be cured.' Kung-nî said, 'Alas!\n\nThe risk is that you will go only to suffer in the punishment (of yourself)!\n\nThe right method (in such a case) will not admit of any admixture.\n\nWith such admixture, the one method will become many methods.\n\nTheir multiplication will embarrass you.\n\nThat embarrassment will make you anxious.\n\nHowever anxious you may be, you will not save (yourself).\n\nThe perfect men of old first had (what they wanted to do) in themselves, and afterwards they found (the response to it) in others.\n\nIf what they wanted in themselves was not fixed, what leisure had they to go and interfere with the proceedings of any tyrannous man?\n\n'Moreover, do you know how virtue is liable to be dissipated, and how wisdom proceeds to display itself?\n\nVirtue is dissipated in (the pursuit of) the name for it, and wisdom seeks to display itself in the striving with others.\n\nIn the pursuit of the name men overthrow one another; wisdom becomes a weapon of contention.\n\nBoth these things are instruments of evil, and should not be allowed to have free course in one's conduct.\n\nSupposing one's virtue to be great and his sincerity firm, if he do not comprehend the spirit of those (whom he wishes to influence); and supposing he is free from the p.\n\n205 disposition to strive for reputation, if he do not comprehend their, minds;-when in such a case he forcibly insists on benevolence and righteousness, setting them forth in the strongest and most direct language, before the tyrant, then he, hating (his reprover's) possession of those excellences, will put him down as doing him injury.\n\nHe who injures others is sure to be injured by them in return.\n\nYou indeed will hardly escape being injured by the man (to whom you go) 1 'Further, if perchance he takes pleasure in men of worth and hates those of an opposite character, what is the use of your seeking to make yourself out to be different (from such men about him)?\n\nBefore you have begun to announce (your views), he, as king and ruler, will take advantage of you, and immediately contend with you for victory.\n\nYour eyes will be dazed and full of perplexity; you will try to look pleased with him; you will frame your words with care; your demeanour will be conformed to his; you will confirm him in his views."

