body = "the duchy of Sung, born in what was then called the district of Mäng, and belonged to the state or kingdom of Liang or Wei.\n\nAs he grew up, he filled some official post in the city of Zhî-yüan,--the site of which it is not easy to determine with certainty.\n\nIn A.D.\n\n742, the name of his birth-place was changed (but only for a time) to Nan-hwa, and an imperial order was issued that Kwang-Sze should thenceforth p.\n\n12 be styled 'The True Man of Nan-hwa,' and his Book, 'The True Book of Nan-hwa 1 .' To be 'a True Man' is the highest Tâoistic achievement of a man, and our author thus canonised communicates his glory to his Book.\n\nFootnotes 4:1 In the present district of Ling-pâo, Shan Kâu, province of Ho-nan.\n\n5:1 In an ordinary Student's Manual I find a note with reference to this incident to which it may be worth while to give a place here:--The warden, it is said, set before Lâo-dze a dish of tea; and this was the origin of the custom of tea-drinking between host and guest (see the , ch.\n\n7, on Food and Drink).\n\n7:1 The earlier old man of the Ho-side is styled in Chinese ; the other ; but the designations have the same meaning.\n\nSome critical objections to the genuineness of the latter's commentary on the ground of the style are without foundation.\n\n8:1 See Ziâo Hung's Wings or Helps, ch.\n\nv, p.\n\n11 a .\n\n9:1 Notes on Chinese Literature, p.\n\n173.\n\n10:1 A brother of Shih, Sû Kêh (Dze-yû and Ying-pin), wrote a remarkable commentary on the Tâo Teh King; but it was Shih who first discredited those four Books, in his Inscription for the temple of Kwang-dze, prepared in 1078.\n\nNext: Chapter III: What is the Meaning of the Name Tâo?\n\nAnd the Chief Points of Belief in Tâoism"

