[content]
body = "In one of the earliest commentaries on the Tâo Teh King, that by Yen Zun, we have several quotations from Kwang-dze which bear evidently the stamp of his handiwork, and are not in the current Books; but they would not altogether make up a single section.\n\nWe have only to be thankful that so large a proportion of the original work has been preserved.\n\nSû Shih (Dze-kan, and Tung-pho), it is well known, called in question the genuineness of Books 28 to 31 1 .\n\nBooks 15 and 16 have also been challenged, and a paragraph here and there in one or other of the Books.\n\nThe various readings, according to a collation given by Ziâo Hung, are few.\n\n8.\n\nThere can be no doubt that the Books of Kwang-dze were hailed by all the friends of Tâoism.\n\nIt has been Importance to Tâoism of the Books of Kwang-dze.\n\nmentioned above that the names 'Hwang-Tî' and 'Lâo-dze' were associated together as denoting the masters of Tâoism, and the phrase, 'the words of Hwang-Tî and Lâo-dze,' came to be no more than a name for the Tâo Teh King.\n\nGradually the two names were contracted into 'Hwang Lâo,' as in the passage quoted on p.\n\n6 from Pan Kû.\n\nAfter the Han dynasty, the name Hwang gave place to Kwang, and the names Lâo Kwang, and, sometimes inverted, Kwang Lâo, were employed to denote the system or the texts of Tâoism.\n\nIn the account, for instance, of Kî p.\n\n11 Khang, in the nineteenth chapter of the Biographies of Zin, we have a typical Tâoist brought before us.\n\nWhen grown up, 'he loved Lâo and Kwang;' and a visitor, to produce the most favourable impression on him, says, 'Lâo-dze and Kwang Kâu are my masters.' 9.\n\nThe thirty-three Books of Kwang-dze are divided into three Parts, called Nêi, or 'the Inner;' Wâi, or 'the Outer;' and Zâ, 'the Miscellaneous.' The first Part Division of the Books into three Parts.\n\ncomprises seven Books; the second, fifteen; and the third, eleven.\n\n'Inner' may be understood as equivalent to esoteric or More Important.\n\nThe titles of the several Books are significant, and each expresses the subject or theme of its Book.\n\nThey are believed to have been prefixed by Kwang-dze himself, and that no alteration could be made in the composition but for the worse.\n\n'Outer' is understood in the sense of supplementary or subsidiary.\n\nThe fifteen Books so called are 'Wings' to the previous seven.\n\nTheir titles were not given by the author, and are not significant of the Tâoistic truth which all the paragraphs unite, or should unite, in illustrating; they are merely some name or phrase taken from the commencement of the first paragraph in each Book,--like the names of the Books of the Confucian Analects, or of the Hebrew Pentateuch.\n\nThe fixing them originally is generally supposed to have been the work of Kwo Hsiang.\n\nThe eleven Miscellaneous Books are also supplementary to those of the first Part, and it is not easy to see why a difference was made between them and the fifteen that precede.\n\n10.\n\nKwang-dze's writings have long been current under the name of Nan Hwa Kin King.\n\nHe was a native of The general title of Kwang-dze's works."

