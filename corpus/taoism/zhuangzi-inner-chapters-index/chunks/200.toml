body = "Sacred Texts Taoism Index Previous Next p.\n\n223 BOOK V.\n\nPART I.\n\nSECTION V.\n\nTeh Khung Fû, or 'The Seal of Virtue Complete 1 .' 1.\n\nIn Lû 2 there was a Wang Thâi 3 who had lost both his feet 4 ; while his disciples who followed and went about with him were as numerous as those of Kung-nî.\n\nKhang Kî 5 asked Kung-nî about him, saying, 'Though Wang Thâi is a cripple, the disciples who follow him about divide Lû equally with you, Master.\n\nWhen he stands, he does not teach them; when he sits, he does not discourse to them.\n\nBut they go to him empty, and come back full.\n\nIs there indeed such a thing as instruction without words 6 ?\n\nand while the body is imperfect, may the mind be complete?\n\nWhat sort of man is he?' Kung-nî replied, 'This master is a sage.\n\nI have p.\n\n224 only been too late in going to him.\n\nI will make him my teacher; and how much more should those do so who are not equal to me!\n\nWhy should only the state of Lû follow him?\n\nI will lead on all under heaven with me to do so.' Khang Kî rejoined, 'He is a man who has lost his feet, and yet he is known as the venerable Wang 1 ;--he must be very different from ordinary men.\n\nWhat is the peculiar way in which he employs his mind?' The reply was, 'Death and life are great considerations, but they could work no change in him.\n\nThough heaven and earth were to be overturned and fall, they would occasion him no loss.\n\nHis judgment is fixed regarding that in which there is no element of falsehood 2 ; and, while other things change, he changes not.\n\nThe transformations of things are to him the developments prescribed for them, and he keeps fast hold of the author of them 2 .' Khang Kî said, 'What do you mean?\n\nWhen we look at things,' said Kung-nî, 'as they differ, we see them to be different, (as for instance) the liver and the gall, or Khû and Yüeh; when we look at them, as they agree, we see them all to be a unity.\n\nSo it is with this (Wang Thai).\n\nHe takes no knowledge of the things for which his ears and eyes are the appropriate organs, but his mind delights itself in the harmony of (all excellent) qualities.\n\nHe looks at the unity which belongs to things, and does not perceive where they have suffered loss.\n\nHe looks p.\n\n225 on the loss of his feet as only the loss of so much earth.' Khang Kî said, 'He is entirely occupied with his (proper) self 1 .\n\nBy his knowledge he has discovered (the nature of) his mind, and to that he holds as what is unchangeable 1 ; but how is it that men make so much of him?' The reply was, 'Men do not look into running water as a mirror, but into still water;--it is only the still water that can arrest them all, and keep them (in the contemplation of their real selves).\n\nOf things which are what they are by the influence of the earth, it is only the pine and cypress which are the best instances;-in winter as in summer brightly green 2 .\n\nOf those which were what they were by the influence of Heaven 3 , the most correct examples were Yâo and Shun; fortunate in (thus) maintaining their own life correct, and so as to correct the lives of others."

