[content]
body = "are those of Zâo Hwâ, 'Maker and Transformer,' and Zâo Wû Kê, 'Maker of things.' Instances of both these names are found in Bk.\n\nVI, parr.\n\n9, 10.\n\n'Creator' and 'God' have both been employed for them; but there is no idea of Creation in Tâoism.\n\nAgain and again Kwang-dze entertains the question of p.\n\n20 how it was at the first beginning of things.\n\nDifferent views are stated.\n\nIn Bk.\n\nII, par.\n\n4, he says:--'Among the men of old their knowledge reached the extreme point.\n\nWhat was that extreme point?\n\n'Some held that at first there was not anything.\n\nThis is the extreme point,--the utmost limit to which nothing can be added.\n\n'A second class held that there was something, but without any responsive recognition of it (on the part of man).\n\n'A third class held that there was such recognition, but there had not begun to be any expression of different opinions about it.\n\nIt was through the definite expression of different opinions about it that there ensued injury to the (doctrine of the) Tâo 1 .' The first of these three views was that which Kwang-dze himself preferred.\n\nThe most condensed expression of it is given in Bk.\n\nXII, par.\n\n8:--'In the Grand Beginning of all things there was nothing in all the vacancy of space; there was nothing that could be named 2 .\n\nIt was in this state that there arose the first existence; the first existence, but still without bodily shape.\n\nFrom this things could be produced, (receiving) what we call their several characters.\n\nThat which had no bodily shape was divided, and then without intermission there was what we call the process of conferring.\n\n(The two processes) continued to operate, and things were produced.\n\nAs they were completed, there appeared the distinguishing lines of each, which we call the bodily shape.\n\nThat shape was the body preserving in it the spirit, and each had its peculiar manifestation which we call its nature.' Such was the genesis of things; the formation of heaven p.\n\n21 and earth and all that in them is, under the guidance of the Tâo.\n\nIt was an evolution and not a creation.\n\nHow the Tâo itself came,--I do not say into existence, but into operation,--neither Lâo nor Kwang ever thought of saying anything about.\n\nWe have seen that it is nothing material 1 .\n\nIt acted spontaneously of itself.\n\nIts sudden appearance in the field of non-existence, Producer, Transformer, Beautifier, surpasses my comprehension.\n\nTo Lâo it seemed to be before God.\n\nI am compelled to accept the existence of God, as the ultimate Fact, bowing before it with reverence, and not attempting to explain it, the one mystery, the sole mystery of the universe.\n\n4.\n\n'The bodily shape was the body preserving in it the spirit, and each had its peculiar manifestation which we call its nature.' So it is said in the passage quoted above from Kwang-dze's twelfth Book, and the language shows Man is composed of body and spirit.\n\nhow Tâoism, in a loose and indefinite way, considered man to be composed of body and spirit, associated together, yet not necessarily dependent on each other.\n\nLittle is found bearing on this tenet in the Tâo Teh King.\n\nThe concluding sentence of ch.\n\n33, 'He who dies and yet does not perish, has longevity,' is of doubtful acceptation.\n\nMore pertinent is the description of life as 'a coming forth,' and of death as 'an entering 2 ;' but Kwang-dze expounds more fully, though after all unsatisfactorily, the teaching of their system on the subject."

