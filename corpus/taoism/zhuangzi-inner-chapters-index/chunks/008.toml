[content]
body = "Giles, indeed, occasionally launched a shaft also at Julien and myself; but his main object in his article was to discredit the genuineness and authenticity of the Tâo Teh King itself.\n\n'The work,' he says, 'is undoubtedly a forgery.\n\nIt contains, indeed, much that Lâo Tzû did say, but more that he did not.' I replied, so far as was necessary, to Mr.\n\nGiles in the same Review for January and February, 1888; and a brief summary of my reply is given in the second chapter of the Introduction in this volume.\n\nMy confidence has never been shaken for a moment in the Tâo Teh King as a genuine relic of Lâo-dze, one of the most original minds of the Chinese race.\n\nIn preparing the version now published, I have used:-- First, 'The Complete Works of the Ten Philosophers;' a Sû-kâu reprint in 1804 of the best editions of the Philosophers, nearly all belonging more or less to the Tâoist school, included in it.\n\nIt is a fine specimen of Chinese printing, clear and accurate.\n\nThe Treatise of Lâo-dze of course occupies the first place, as edited by Kwei Yû-kwang (better known as Kwei Kän-shan) of the Ming dynasty.\n\nThe Text and Commentary are those of Ho-shang Kung (Introd., p.\n\n7), along with the division of the whole into Parts and eighty-one chapters, and the titles of the several chapters, all attributed to him.\n\nAlong the top of the page, p.\n\nxv there is a large collection of notes from celebrated commentators and writers down to the editor himself.\n\nSecond, the Text and Commentary of Wang Pî (called also Fû-sze), who died A.D.\n\n249, at the early age of twenty-four.\n\nSee Introduction, p.\n\n8.\n\nThird, 'Helps (lit.\n\nWings) to Lâo-dze;' by Ziâo Hung (called also Zâo-hâu), and prefaced by him in 1587.\n\nThis is what Julien calls 'the most extensive and most important contribution to the understanding of Lâo-dze, which we yet possess.' Its contents are selected from the ablest writings on the Treatise from Han Fei (Introd., p.\n\n5) downwards, closing in many chapters with the notes made by the compiler himself in the course of his studies.\n\nAltogether the book sets before us the substance of the views of sixty-four writers on our short King.\n\nJulien took the trouble to analyse the list of them, and found it composed of three emperors, twenty professed Tâoists, seven Buddhists, and thirty-four Confucianists or members of the Literati.\n\nHe says, 'These last constantly explain Lâo-dze according to the ideas peculiar to the School of Confucius, at the risk of misrepresenting him, and with the express intention of throttling his system;' then adding, 'The commentaries written in such a spirit have no interest for persons who wish to enter fully into the thought of Lâo-dze, and obtain a just idea of his doctrine.\n\nI have thought it useless, therefore, to specify the names of such commentaries and their authors.' I have quoted these sentences of Julien, because of a charge brought by Mr.\n\nBalfour, in a prefatory note to his own version of the Tâo Teh King, against him and other translators.\n\n'One prime defect,' he says, though with some hesitation, 'lies at the root of every translation that has been published hitherto; and this is, that not one seems to have been based solely and entirely on commentaries furnished by members of the Tâoist school."

