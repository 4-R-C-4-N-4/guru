[content]
body = "The softest thing in the world dashes against and overcomes the hardest; that which has no (substantial) existence enters where there is no crevice. I know hereby what advantage belongs to doing nothing (with a purpose). There are few in the world who attain to the teaching without words, and the advantage arising from non-action."

