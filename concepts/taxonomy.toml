[families.soteriology.ecstatic_ascent]
label = "Ecstatic Ascent"
definition = "Eros-driven rapture and ascent."

[families.soteriology.purgation_and_emptiness]
label = "Purgation And Emptiness"
definition = "The felt costs, negations, and emptyings of the path."

[families.soteriology.soteric_categories]
