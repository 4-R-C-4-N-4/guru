[families.cosmology.origin_events]
label = "Origin Events"
definition = "Originating events and re-creations of the cosmos."

[families.cosmology.soul_cosmology]
label = "Soul Cosmology"
definition = "The cosmic geography of the soul."


# ── soteriology ──
[families.soteriology.knowledge_path]
label = "Knowledge Path"
definition = "Salvation through knowing."

[families.soteriology.union_and_return]
label = "Union And Return"
definition = "Merging with and returning to the divine source."

[families.soteriology.ecstatic_ascent]
label = "Ecstatic Ascent"
definition = "Eros-driven rapture and ascent."

[families.soteriology.purgation_and_emptiness]
label = "Purgation And Emptiness"
definition = "The felt costs, negations, and emptyings of the path."

[families.soteriology.soteric_categories]
label = "Soteric Categories"
definition = "Typological frames for who is saved and when."


# ── theology ──
[families.theology.divine_nature]
