# ============================================================
# CONCEPTS (grouped by family)
# ============================================================

[concepts.cosmology.divine_structure]
emanation_hierarchy = "A chain of divine beings or principles flowing downward from a single transcendent source (the One or the Father), each level less perfect than the one above."
pleroma = "The divine fullness or totality of the highest realm, populated by aeons and divine attributes, contrasted with the deficient material world."
kenoma = "The void or emptiness outside the pleroma; the realm of matter, ignorance, and deficiency."
monad = "The absolutely simple, undivided first principle from which all multiplicity and existence flows."
aeons = "Divine archetypal beings or eternal attributes dwelling within the Pleroma, often arranged in male-female syzygies."
logos = "The divine reason, word, or ordering principle through which the universe was created; mediates between the transcendent God and the material world."
sephirot = "The ten attributes or emanations through which the Ein Sof (Infinite) reveals itself and creates the universe in Kabbalistic theology."
sefirot_tree = "The diagrammatic arrangement of the ten Sephirot as a structured 'Tree of Life' mapping divine and cosmic forces."
world_tree_axis = "A vertical structure connecting cosmic levels — a tree, pillar, mountain, or ladder linking heaven, earth, and underworld around which the cosmos is organised. Yggdrasil binding the Nine Worlds in Norse cosmology, the Kalevala's Sampo as world-pillar, the Mayan ceiba, the Vedic Aśvattha, the shamanic central tree of Eliade's analyses. Cosmic-structural in character: distinct from sefirot_tree (a kabbalistic emanation diagram) and emanation_hierarchy (an ontological cascade); world_tree_axis is the cosmos's spine rather than the divine's outflow."

[concepts.cosmology.cosmic_agents]
demiurge = "A secondary creator deity—often ignorant or malevolent—responsible for fashioning the material world, distinct from the supreme transcendent God."
archons = "Malevolent planetary rulers or demiurgic powers that govern the material world and obstruct the soul's ascent."
ahura_mazda_principle = "The divine ordering principle of truth and light."
angra_mainyu_principle = "The principle of cosmic disorder and falsity."
watchers_descent = "The 1 Enoch narrative in which a class of originally-good angelic beings (the Watchers) descends, mates with women, and teaches forbidden arts — the substrate that Gnostic archons inherits and inverts: archons are born malevolent, the Watchers fall through transgression."
animism = "The doctrine and worldview that natural phenomena, places, and objects possess inherent spirit, soul, or personality — and that the cosmos is populated by countless local, plural, embodied divine agents: kami in mountain and tree, sidhe in cairn and well, landwights in field and stone, nymphs in spring and grove, haltija in forest and lake, lares and penates in household and threshold, Iamblichean daemons in element and place. Distinct from monotheism (single transcendent God), pantheism (one underlying substance), and emanation_hierarchy (cascading single source); animism's signature is the plurality, locality, and embodied-in-landscape character of the divine."

[concepts.cosmology.cosmic_order]
asha_cosmic_order = "Truth as the fundamental structure of reality."
maat_cosmic_order = "The Egyptian principle of truth, balance, and right order underlying both the cosmos and human conduct; the parallel to Zoroastrian asha and Greek dike."
correspondence = "The Hermetic axiom that the structure of the cosmos is reflected at every scale — 'as above, so below; as within, so without' — making each level a legible map of the others."
microcosm_macrocosm = "The human being as a small-scale image of the entire cosmos; the body, soul, and intellect mirroring the structure of the heavens and the divine — distinct from correspondence in that it makes the human the privileged mirror."
cosmic_sympathy = "The Stoic and Plotinian doctrine that all parts of the cosmos are bound by hidden affinities, so that a movement in one part resonates through the whole; the metaphysical basis for astrology, magic, and divination."
infinite_cosmos = "The doctrine of the universe as boundless and without center or circumference, populated by innumerable worlds — Bruno's rejection of the closed Aristotelian sphere; the divine and the cosmos as ontologically infinite."

[concepts.cosmology.origin_events]
letters_of_creation = "The twenty-two Hebrew letters as the building blocks through which God creates and sustains all existence."
tzimtzum = "Luria's doctrine of the divine self-contraction by which Ein Sof withdraws to make ontological room for a created world; creation as divine self-limitation rather than emanation outward."
fall_of_sophia = "The Gnostic myth of Wisdom's prolapse from the Pleroma — her unilateral desire or error producing the Demiurge and the entrapment of divine sparks in matter."
frashokereti = "The final restoration/renovation of the cosmos."
apocatastasis = "The doctrine of the periodic restoration or recurrence of all things to their original state after vast cycles."
cosmogony = "Narratives or doctrines of cosmic origin — how heaven, earth, and the primordial deities first came into being. The Kojiki's deities born alone on the Plain of High Heaven, Voluspo's Ginnungagap, Genesis's tohu wa-bohu, the Timaeus's Demiurge fashioning the Receptacle, the Hesiodic Theogony, the Kalevala's egg-cosmogony, Egyptian Nun-and-Atum. Distinct from emanation_hierarchy (structural-ontological cascade), letters_of_creation (mechanism of creation), and apocatastasis/frashokereti (end-state restoration); cosmogony is temporally-narrative beginning."

[concepts.cosmology.soul_cosmology]
divine_sparks = "Fragments of divine light or spirit trapped inside material bodies, awaiting liberation and return to their source."
soul_migration = "The transmigration of the soul across lives."
psychopomp_journey = "Guided passage of the soul through afterlife realms."

[concepts.soteriology.knowledge_path]
gnosis_direct_knowledge = "Salvation through direct experiential knowledge of the divine nature, not through faith, ritual, or moral works alone."
self_knowledge = "The recognition of one's own true divine nature as the primary path to liberation; 'know thyself' as soteriology."
anamnesis = "Platonic recollection: knowledge as the soul's recovery of what it knew before birth, with learning as remembering rather than acquisition."
hidden_sayings = "Esoteric teachings reserved for those ready to receive them; outer meaning conceals an inner liberating truth."
forbidden_knowledge = "Transgressive knowing acquired against divine prohibition — the Watchers' teaching of metallurgy, sorcery, and cosmetics in 1 Enoch, the Gnostic Eve narratives, the Promethean mytheme; explicitly contrasted with gnosis_direct_knowledge, which is salvific."
emotional_epistemology = "The doctrine that emotions constitute a valid and necessary mode of knowing reality, complementing or surpassing intellectual cognition."

[concepts.soteriology.union_and_return]
return_to_source = "The soul's journey back to its divine origin, reversing the fall into matter through stages of purification or illumination."
divine_marriage = "The reunification of complementary divine principles (male-female, spirit-matter) as a symbol of wholeness and salvation."
mystical_union = "The merging of the individual soul or self with the divine, transcending personal identity."
theosis_deification = "The doctrine — central to Eastern Orthodox and Maximian theology — that the human person is progressively transformed into a partaker of the divine nature by grace, not merely justified or united in passing ecstasy."
fana_annihilation = "Sufi self-effacement in God — the via by which the lover is unmade as a separate ego and recovered as God's act; specifies the practice/event rather than mystical_union's resulting state."

[concepts.soteriology.ecstatic_ascent]
divine_madness = "Ecstatic irrational rapture — Plato's mania, Bruno's furore — by which the soul transcends ordinary reason and attains direct contact with divine reality; madness reframed as higher knowledge."
ladder_of_love = "Diotima's staged ascent from love of beautiful bodies → beautiful souls → beautiful pursuits → beautiful knowledge → Beauty itself; the canonical scala amoris that grounds Plotinus's On the Beautiful and Bruno's Eroici Furori — distinct from generic spiritual_ascent in that eros is the specific motive force."

[concepts.soteriology.purgation_and_emptiness]
dark_night = "John of the Cross's stage of contemplative purgation: a felt absence and aridity of God that strips the soul of attachments to its own consolations en route to deeper union."
separation_from_source = "The felt condition of exile from one's divine origin — Rumi's reed flute torn from its bed, Plotinus's 'we have forgotten,' the Gnostic forgetfulness; the affective wound that complements return_to_source and gives the return its motive."
sunyata_emptiness = "The Buddhist doctrine that all phenomena lack independent self-nature; emptiness as the positive recognition that things arise only in dependence on conditions — distinct from kenoma's mere deficiency."

[concepts.soteriology.soteric_categories]
pneumatic_elect = "A spiritual elite who possess the divine spark and are predestined for salvation, contrasted with psychic (faithful) and hylic (material) persons."
eschatological_judgment = "Final, collective cosmic judgment as an event in which the wicked are sentenced and the cosmos restored; distinct from psychopomp_journey (individual passage at death) and emphasising verdict where Zoroastrian frashokereti emphasises restoration."

[concepts.theology.divine_nature]
apophatic_theology = "Describing the divine only by negation—God transcends all positive categories and concepts; the via negativa."
divine_hiddenness = "The supreme God's radical concealment beyond ordinary knowledge or perception; the Hidden Father."
divine_simplicity = "The doctrine that God has no parts, divisions, or composite attributes; pure undivided being."
ein_sof = "The infinite, unknowable aspect of the divine prior to and beyond all emanation; the hidden root from which the Sephirot unfold."
anthropomorphism = "Attributing human characteristics, emotions, or form to the divine; embodied divine imagery."
shapeshifting_transformation = "Form-mutability as a constitutional property of divine and preternatural beings — gods, heroes, spirits, and their human practitioners possessing inherent capacity to alter form across human, animal, plant, or elemental states. Loki and Odin's transformations in Norse, Math's pigs and Blodeuwedd's owl-shape and Pwyll's exchange with Arawn in the Mabinogion, the Greek Proteus, the Indian dasavatara, Vainamoinen's bird-flight in the Kalevala, Ovid's metamorphoses, the shamanic and witch's capacity for ritual form-change. Distinct from anthropomorphism (divine taking specific human form, single embodiment) in that anthropomorphism establishes a stable form whereas this concept establishes form's plurality and instability."

[concepts.theology.divine_attributes_and_acts]
divine_light = "The uncreated luminous quality of the divine, sometimes experienced directly in mystical states; illumination as revelation."
living_god = "The divine conceived as active, present, and dynamic—not an abstract principle but a personal responsive reality."
sacred_names = "Divine names or formulas that carry ontological power, used in prayer, liturgy, or magical practice."
divine_providence = "Pronoia — the doctrine that the divine actively orders the unfolding of the cosmos and human affairs toward intelligible ends, against pure chance or blind necessity."
covenant = "A binding agreement or relationship between the divine and a people or individual, establishing mutual obligations."

[concepts.theology.ontological_structure]
unity_of_being = "The doctrine that all existence is ultimately one substance or one divine reality; non-duality as a theological claim."
evil_as_privation = "Augustinian and Plotinian doctrine that evil has no positive being of its own but is a lack, distortion, or absence of the good — denying ontological dualism while preserving moral seriousness."
cosmic_dualism = "Ontological opposition between two primal principles (light/darkness, truth/lie, spirit/matter) as the fundamental structure of reality."
numerical_mysticism = "Numbers, proportions, and mathematical relationships as the underlying structure of divine reality."

[concepts.praxis.contemplative_practice]
meditation = "Disciplined inward attention — sitting, focused, or open-awareness practice — as a stand-alone term that umbrellas active_contemplation, inner_silence, and dhyana-style sitting."
active_contemplation = "A form of meditation that uses imagery, imagination, or symbolic thought rather than purely empty stillness."
inner_silence = "The practice of stilling the mind and speech to open receptivity to divine knowledge or presence."
detachment_gelassenheit = "Eckhart's Abgeschiedenheit/Gelassenheit — radical letting-go of will, image, and grasping that opens the soul to God; distinct from inner_silence (quietness) and from material renunciation, and adjacent to Sufi tark and Buddhist non-grasping as a practice rather than a metaphysical claim."
wu_wei = "Effortless action aligned with the spontaneous flow of the Dao; non-coercive, non-striving conduct that yields results without forcing — the sage acts without acting."
nature_preservation = "The ethical imperative to live in accordance with one's innate nature and avoid artificial social constraints that harm it."

[concepts.praxis.ritual_and_symbolic]
letter_meditation = "Contemplative practice focused on Hebrew letters as cosmic symbols or gates of divine power."
permutation_of_letters = "Combining, transposing, or cycling through letters or names as a meditative or theurgical technique."
ritual_fire = "Fire as medium of divine presence."
word_power_incantation = "The doctrine and practice that spoken or sung word carries causal-magical force — that uttering names, formulas, songs, or incantations alters reality directly rather than merely communicating about it. Vainamoinen's runo-songs that move mountains and command iron, Norse galdr, Vedic mantra, Shinto kotodama, the magician's barbarous names in the Greek Magical Papyri, Iamblichean arcane signatures and inexplicable symbols, biblical creation-by-word. Distinct from sacred_names (the ontological power of names themselves) and prayer (address to the divine); word_power_incantation is the magical-causal efficacy of the spoken word as such."
ancestor_veneration = "Ritual maintenance of relationship with the dead as ongoing presences whose favour is cultivated and whose offence is propitiated. Shinto uji-gami and obon, Norse disir and the alfablot, Celtic samhain and the feast for the deceased, Roman lares and parentalia, Chinese ancestor rites, Vedic śrāddha. Practice-coded rather than belief-coded: distinct from soul_migration (cosmological doctrine of soul-transmigration) and theosis_deification (deification trajectory); ancestor_veneration centres the living's ongoing ritual obligation to the dead."
funerary_navigation = "Texts and rituals guiding the soul through death."
theurgy = "Iamblichean ritual practice that engages the gods directly through consecrated material symbols and actions, on the premise that divine power descends into properly prepared matter — distinct from philosophical contemplation alone."
prayer = "Direct address to the divine, whether petitionary, contemplative, or liturgical; speech and silence offered upward."

[concepts.praxis.ascetic_discipline]
fasting_and_prayer = "Ascetic disciplines that prepare the body and mind for spiritual receptivity or purification."
ritual_purity = "The maintenance of a state of cleanliness—physical, moral, or spiritual—required for encounter with the divine."
self_examination = "Daily review of thought and action as spiritual practice."

[concepts.praxis.ecstatic_modes]
heroic_furor = "Bruno's eroici furori — a passionate, ennobling spiritual ardor that drives the soul toward divine wisdom; distinguished from base or animal passions by its orientation to infinite truth."
divine_intoxication = "Ecstatic, non-rational receptivity to the divine figured as drunkenness — Plato's symposium wine, Rumi's sukr, Eckhart's 'sober drunkenness'; the passive/receptive metaphor for divine encounter, distinct from divine_madness's active possessing rapture."
shamanic_journey = "The living practitioner's deliberate trance-journey into spirit, underworld, or upper realms — Lemminkainen's descent into Tuoni and Wainamoinen's entry into Wipunen's body in the Kalevala, the Siberian shaman's drum-mediated travel, Inuit angakkuq's submarine journey to Sedna, classical katabasis as ritual technique. The practitioner returns with knowledge, songs, lost-words, or a recovered soul. Distinct from psychopomp_journey (which guides the *dead* soul through afterlife realms) and from spiritual_ascent (which is the soul's *upward* return to source); shamanic_journey is the *living* practitioner crossing into ordinarily-inaccessible domains as a worked technique."

[concepts.praxis.transformative_path]
alchemical_work = "The transformation of base substance — outer matter or the inner soul — into a purified, perfected, or 'gold' state; the magnum opus as both laboratory practice and spiritual allegory."
spiritual_ascent = "A staged journey of the soul upward through heavenly realms or levels of being toward the divine source."

[concepts.anthropology.divine_indwelling]
inner_light = "The divine spark or luminous quality residing within the human person, potentially recognisable through introspection."
kingdom_within = "The claim that the divine realm is present inside the individual, accessible without external mediation."
birth_of_word_in_soul = "Eckhart's signature doctrine that the Father eternally begets the Son in the ground of the soul; the human interior as the actual site of the divine generative act, distinct from inner_light's static indwelling."

[concepts.anthropology.human_constitution]
tripartite_soul = "Division of the human being into three principles: spirit (pneuma), soul (psyche), and body/matter (hyle or soma)."
body_as_obstacle = "The material body viewed as a prison, tomb, or source of error that hinders spiritual knowledge and return."
mechanical_humanity = "Gurdjieff and Ouspensky's claim that ordinary human beings live in a state of waking sleep, reacting mechanically without unified will or consciousness, and that the spiritual path begins with recognising this condition."
linga_sharira = "The persistent form or image of a human being that exists from birth to death, distinct from the impermanent physical matter."

[concepts.anthropology.spiritual_completion]
opposites_transcended = "The dissolution of binary oppositions (male/female, inner/outer, above/below) as a mark of spiritual completion."
childlike_innocence = "The infant or child as symbol of the unfallen, undivided spiritual state; return to primordial simplicity."
poverty_of_spirit = "Eckhart's radical reading of Matthew 5:3 — the saint as one who wants nothing, knows nothing, and has nothing, having emptied even the will and the self with which to receive God; distinct from renunciation_of_wealth (material poverty)."
cosmic_consciousness = "A state of awareness transcending ordinary human consciousness, often involving unity with the universe or higher dimensions."

[concepts.ethics.moral_teaching]
renunciation_of_wealth = "The spiritual danger of attachment to material possessions; wealth as a spiritual obstacle."
love_of_neighbour = "Active compassionate care for others as a central spiritual obligation or expression of divine love."
rejection_of_hypocrisy = "Critique of outward religious observance that lacks inner transformation; form without substance."
paradox_as_teaching = "Using apparent contradiction, reversal, or riddle to destabilise ordinary understanding and induce insight."
good_thought_word_deed = "The Zoroastrian triad of right thought, right speech, and right action as the foundation of ethical life; truth-in-living."
prophetic_rejection = "The phenomenon where spiritual messengers or healers are rejected by their own community due to familiarity or lack of awe."

# ============================================================
# CONCEPT ALIASES
# ============================================================
# Natural-language synonyms that map a user query to a canonical concept via the
# graph leg (extractConcepts -> walkGraph), complementing the lexical leg.
#
# CRITERION (matcher = GRAPH_MATCH_MODE=regex, the default since 2026-05-29):
# word-boundary, case-insensitive (~*). An alias fires only on a WHOLE-WORD query
# match, so short forms no longer substring-collide ("mania" no longer fires on
# "man"). STILL true: a MULTI-WORD alias fires on each of its whole words, so a
# phrase with a common word over-fires ("dark night of the soul" -> "soul",
# "sacred marriage" -> "sacred", "the one" -> "one"). So prefer the rare/foreign
# token (hieros gamos, via negativa, deus absconditus) over the English phrase
# variant, and skip aliases already in the title-cased label (it self-matches).
# Highest value is foreign/transliterated terms, where the user's word isn't the
# corpus's word. List ALL hyphen/space/apostrophe spellings — the tokenizer does
# NOT bridge them. Stored lowercase (CHECK alias = LOWER(alias); tidy, though ~*
# is case-insensitive). The other ~62 concepts have plain-English self-matching
# labels (divine_light, prayer, covenant, logos, monad, correspondence, ...) and
# deliberately get none. Refined per downstream-matcher audit, 2026-05-29.
[concept_aliases]

# — alternate spelling / transliteration (the core recall gain) —
sephirot = ["sefirot", "sefiroth"]
ein_sof = ["ein-sof", "einsof", "ein soph", "ayn sof"]
tzimtzum = ["tsimtsum", "zimzum"]
maat_cosmic_order = ["ma'at", "maat"]
asha_cosmic_order = ["arta"]
ahura_mazda_principle = ["ohrmazd", "hormazd"]
angra_mainyu_principle = ["ahriman"]
frashokereti = ["frashegird", "frashokart"]
apocatastasis = ["apokatastasis"]       # thin: target has ~1 EXPRESSES edge
fana_annihilation = ["fana", "fana'", "fanaa"]
wu_wei = ["wu-wei", "wuwei"]
sunyata_emptiness = ["shunyata", "sunnata"]
linga_sharira = ["linga-sarira"]        # thin: target has ~1 EXPRESSES edge

# — foreign / technical term the label renames or buries (fires precisely) —
gnosis_direct_knowledge = ["gnosis"]
demiurge = ["yaldabaoth"]
cosmic_sympathy = ["sympatheia"]
mystical_union = ["unio mystica"]
ladder_of_love = ["scala amoris"]
divine_hiddenness = ["deus absconditus"]
return_to_source = ["reditus"]
detachment_gelassenheit = ["gelassenheit"]
heroic_furor = ["eroici furori", "furore"]
divine_intoxication = ["sukr"]
divine_marriage = ["hieros gamos"]
divine_madness = ["mania"]
theosis_deification = ["divinization", "divinisation"]
apophatic_theology = ["via negativa"]
emanation_hierarchy = ["emanation"]

# — common name not in the label (precise single tokens / rare compounds) —
soul_migration = ["transmigration", "metempsychosis", "reincarnation"]
psychopomp_journey = ["psychopomp"]
anamnesis = ["recollection"]
watchers_descent = ["nephilim"]
alchemical_work = ["alchemy", "magnum opus"]
