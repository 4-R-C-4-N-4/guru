# Leland's Aradia: html_multi from sacred-texts.com. acquire writes one
# raw file per fetched page (24 total: ara03..ara17 = Ch. I..XV, plus
# the index, ara00 Title, ara01 Preface, ara02 Contents, ara18 Appendix,
# and several auto-detected adjacent pages). page-as-chunk: each chapter
# file becomes one chunk, auto-sub-split at max_tokens on paragraph
# boundaries. The non-chapter pages will surface as additional chunks
# unless dropped post-acquisition (apparatus-reject downstream).
#
# Per pagan.md the spec said "paragraph-group, ~6 paras". With page-as-
# chunk, the equivalent control is max_tokens — set to 600 so each
# Leland chapter (Italian incantations interleaved with English) splits
# into roughly chapter-section-sized chunks rather than one giant blob.
[chunking]
strategy = "page-as-chunk"
section_label_format = "Chapter {n}"
section_label_format_no_number_match = "Page {n}"
# Roman numeral after CHAPTER (Leland chapters: "CHAPTER I", "CHAPTER II", etc.).
# Pages without a CHAPTER marker (front-matter, appendix) fall back to "Page {n}".
number_source = "content"
number_pattern = 'CHAPTER\s+([IVXLCDM]+)'
max_tokens = 600

[metadata]
tradition = "pagan_witchcraft"
text_name = "Aradia, or the Gospel of the Witches"
translator = "Charles Godfrey Leland"
sections_format = "chapter"
