[chunking]
strategy = "regex-section-split"
pattern = '^YASNA [IVXLCDM]+'
section_label_format = "Yasna {n}"
max_tokens = 800

[chunking.section_enrichment]
"28-34" = "Ahunavaiti Gatha, Yasna {n}"
"35-42" = "Yasna Haptanghaiti, Yasna {n}"
"43-46" = "Ushtavaiti Gatha, Yasna {n}"
"47-50" = "Spenta Mainyu Gatha, Yasna {n}"
"51" = "Vohu Khshathra Gatha, Yasna 51"
"53" = "Vahishtoishti Gatha, Yasna 53"

[metadata]
tradition = "Zoroastrianism"
text_name = "Avesta (Yasna)"
translator = "L.H. Mills"
sections_format = "yasna_chapter"
