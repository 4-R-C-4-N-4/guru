# Mirrors plato-symposium.toml — same translator (Jowett 1871), same
# sacred-texts.com single-<PRE> shape, same paragraph-group strategy.
# Timaeus has no in-line section markers (no Stephanus pagination,
# no speech headings), so paragraph-group is the only viable strategy.
# Pre_strip removes the sacred-texts crumb and the '-THE END-' trailer.
[chunking]
strategy = "paragraph-group"
section_label_format = "Section {n}"
max_tokens = 800
group_size = 2
pre_strip_patterns = [
    "^Sacred Texts Classics Plato\\s+",
    "-THE END-\\s*$",
]

[metadata]
tradition = "platonism"
text_name = "Plato: Timaeus"
translator = "Benjamin Jowett"
sections_format = "section"
