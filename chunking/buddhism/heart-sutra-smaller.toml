# Heart Sutra — SBE49 (Müller 1894). Tiny (~10KB raw), so paragraph-group
# at group_size=3 typically yields 1-2 chunks per recension. Pre_strip
# kills the apparatus footer that survives if the downloader patch
# 5a794b5e isn't yet effective on a given source (belt-and-suspenders).
[chunking]
strategy = "paragraph-group"
section_label_format = "Section {n}"
paragraphs_per_chunk = 3
max_tokens = 800
pre_strip_patterns = [
    "(?m)^Footnotes\\b[\\s\\S]*$",
]

[metadata]
tradition = "Buddhism"
text_name = "Prajña-pâramitâ-hridaya (Heart Sutra)"
translator = "F. Max Müller"
sections_format = "section"
