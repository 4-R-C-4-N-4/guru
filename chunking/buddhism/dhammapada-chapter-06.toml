# Dhammapada Chapter VI — SBE10 (Müller 1881). Per-chapter
# manifest entry. Each chapter is short (~10-50 verses); paragraph-group
# at group_size=3 typically yields 1-3 chunks. Same belt-and-suspenders
# Footnotes pre_strip as the Heart Sutra in case any SBE source predates
# the 5a794b5e patch's re-acquire pass.
[chunking]
strategy = "paragraph-group"
section_label_format = "Chapter VI, Section {n}"
paragraphs_per_chunk = 3
max_tokens = 800
pre_strip_patterns = [
    "(?m)^Footnotes\\b[\\s\\S]*$",
]

[metadata]
tradition = "Buddhism"
text_name = "The Dhammapada"
translator = "F. Max Müller"
sections_format = "chapter"
