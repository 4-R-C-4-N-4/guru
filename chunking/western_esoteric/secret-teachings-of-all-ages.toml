# The Secret Teachings of All Ages (Manly P. Hall, 1928) — Global Grey
# complete-text page via generic_html. Raw is one flattened line. 45 sections:
# Preface, Introduction, 42 chapters, Conclusion. Split on exact-title
# alternation with a boundary lookahead — several titles recur in prose
# ("The Chemical Marriage" x12, "Introduction" x3, "Pythagorean Mathematics"
# x3), so each title must be followed by the chapter-opening signature: an
# optional "Part N " then an ALL-CAPS word (or "A CAPS", or the one
# prose-start exception "No better way" — the Celentano figures chapter).
# All 45 markers verified unique and monotonic against the raw
# (2026-07-17). Three chapters carry internal "Part 2"/"Part 3" markers
# (Ancient Mysteries 1-3, Fishes 1-2, Theory and Practice of Alchemy 1-2);
# bare Part-N labels would collide across chapters, so Parts stay in-body
# and subsplit() letters the chunks. Chapters are 8-110KB -> sentence-level
# subsplit at max_tokens (single-line raw; no paragraph boundaries).
[chunking]
strategy = "regex-section-split"
pattern = '((?:^Preface)|(?:Introduction|The Ancient Mysteries and Secret Societies Which Have Influenced Modern Masonic Symbolism|Atlantis and the Gods of Antiquity|The Life and Teachings of Thoth Hermes Trismegistus|The Initiation of the Pyramid|Isis, the Virgin of the World|The Sun, A Universal Deity|The Zodiac and Its Signs|The Bembine Table of Isis|Wonders of Antiquity|The Life and Philosophy of Pythagoras|Pythagorean Mathematics|The Human Body in Symbolism|The Hiramic Legend|The Pythagorean Theory of Music and Color|Fishes, Insects, Animals, Reptiles and Birds|Flowers, Plants, Fruits, and Trees|Stones, Metals and Gems|Ceremonial Magic and Sorcery|The Elements and Their Inhabitants|Hermetic Pharmacology, Chemistry, and Therapeutics|The Qabbalah, the Secret Doctrine of Israel|Fundamentals of Qabbalistic Cosmogony|The Tree of the Sephiroth|Qabbalistic Keys to the Creation of Man|An Analysis of Tarot Cards|The Tabernacle in the Wilderness|The Fraternity of the Rose Cross|Rosicrucian Doctrines and Tenets|Fifteen Rosicrucian and Qabbalistic Diagrams|Alchemy and Its Exponents|The Theory and Practice of Alchemy|The Hermetic And Alchemical Figures of Claudius De Dominico Celentano Vallis Novi|The Chemical Marriage|Bacon, Shakspere, and the Rosicrucians|The Cryptogram as a factor in Symbolic Philosophy|Freemasonic Symbolism|Mystic Christianity|The Cross and the Crucifixion|The Mystery of the Apocalypse|The Faith of Islam|American Indian Symbolism|The Mysteries and Their Emissaries|Conclusion)(?= (?:Part \d )?(?:[A-Z]{2,}|A [A-Z]{2,}|No better way)))'
section_label_format = "{n}"
max_tokens = 800
group_size = 1
pre_strip_patterns = [
    # Global Grey end-of-page furniture after the Conclusion.
    'THE END \S* Back to top\s*$',
]

[metadata]
tradition = "western_esoteric"
text_name = "The Secret Teachings of All Ages (Manly P. Hall)"
sections_format = "chapter"
