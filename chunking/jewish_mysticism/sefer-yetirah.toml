[chunking]
strategy = "paragraph-group"
# Sefer Yetzirah is dense mystical prose; group 3 paragraphs per chunk
# to stay within token budget while keeping semantic coherence
section_label_format = "Section {n}"
max_tokens = 800
group_size = 3

[metadata]
tradition = "jewish_mysticism"
text_name = "Sefer Yetzirah"
translator = "Sefaria Community Translation"
sections_format = "paragraph"
