# Bellows's Poetic Edda Hovamol ("Ballad of the High One"): single
# sacred-texts.com page. Same Bellows-style [bracketed] commentary as
# Voluspo, preserved as text-critical metadata.
[chunking]
strategy = "paragraph-group"
section_label_format = "Section {n}"
paragraphs_per_chunk = 4
max_tokens = 800

[metadata]
tradition = "norse"
text_name = "The Poetic Edda: Hovamol"
translator = "Henry Adams Bellows"
sections_format = "section"
