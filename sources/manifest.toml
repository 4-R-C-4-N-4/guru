[[source]]
id = "descent-of-inanna"
tradition = "mesopotamian"
label = "The Descent of the Goddess Ishtar into the Lower World"
url = "https://sacred-texts.com/ane/ishtar.htm"
format = "html"
license = "public_domain"
translator = "E.A. Speiser / M. Jastrow"
notes = "Akkadian version of the Sumerian Descent of Inanna. Earliest attested 'harrowing of the underworld' narrative. Direct structural parallel with later Christian, Orphic, and Mithraic underworld journeys."

