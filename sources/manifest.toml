format = "html"
license = "public_domain"
translator = "Benjamin Jowett"
notes = "Jowett 1871 (Scribner). Socrates' last day; immortality of the soul, anamnesis (recollection), body-as-tomb. Bridges Orphic/Pythagorean transmigration (already in greek_mystery) to Gnostic soul-imprisonment. Single-file HTML, continuous dialogue. todo:6689fda7."

