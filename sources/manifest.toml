format = "html"
license = "public_domain"
translator = "Benjamin Jowett"
notes = "Jowett 1871 (Scribner). The prime non-Abrahamic creator-craftsman + world-soul source — direct backing for `demiurge` (upstream of the Gnostic demiurge already in corpus), `numerical_mysticism`, and Hermetic/Neoplatonic cosmogony. Single-file HTML, one continuous <PRE> block, no in-line section markers. todo:ae2b6323."

