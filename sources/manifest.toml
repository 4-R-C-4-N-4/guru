# The Gathas are the oldest Zoroastrian scripture (~1200 BCE),
# Zarathushtra's own hymns. They're organized by meter into five
# groups (Ahunavaiti, Ushtavaiti, Spenta Mainyu, Vohu Khshathra,
# Vahishtoishti) but sacred-texts presents them by Yasna chapter
# number, which is the standard academic citation format.
