# ============================================
# Rolt 1920 (SPCK, London); translator d. 1917, clean US-PD.
# Mystical Theology = the urtext of apophatic_theology; sits between
# Plotinus (held) and Eckhart (held). Divine Names = a major
# emanation_hierarchy source.
# Rolt's introduction (dionysius.iii.* pages) and the Celestial /
# Ecclesiastical Hierarchies (dionysius.vi.* / vii.*) are intentionally
# excluded — those go in a separate follow-up ticket per the ticket
# description.
# todo:d7c3ccef.

[[source]]
id = "dionysius-mystical-theology"
tradition = "christian_mysticism"
label = "Pseudo-Dionysius: The Mystical Theology"
url = "https://www.ccel.org/ccel/rolt/dionysius.v.html"
format = "html"
license = "public_domain"
translator = "C.E. Rolt"
notes = "Rolt 1920. Single 60KB CCEL page containing all 5 chapters inline. The urtext of apophatic_theology — 'the Divine Gloom', the via negativa. Regex-section-split on CHAPTER I..V."

