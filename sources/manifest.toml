# === CONTEMPORARY PAGAN / WITCHCRAFT — REMOVED 2026-06-05 ===
# Originally added in da3ca85a as Leland's Aradia (1899). Removed
# on the same editorial principle that cut Yoruba (Ellis) on 2026-06-04:
# outsider voice on a subaltern tradition, with the would-be informant
# centering (Maddalena) itself disputed by modern scholarship
# (Hutton, Mathiesen) which holds that Leland substantially authored
# the material he attributed to her. Leland was an American man of
# English descent, raised wealthy in Philadelphia, paying a poor
# Italian peasant woman to "collect" folklore for him — class-colonial
# asymmetry parallel to (if gentler than) Ellis-on-Yoruba's
# imperial-colonial one. The "I employed her... to extract it from
# those of her kind" framing makes the asymmetry explicit in the text.
#
# PD status was clean (1899 pre-1929); the cut is editorial, not legal.
#
# Insider-perspective modern witchcraft texts (Doreen Valiente,
# Starhawk, Sabina Magliocco's ethnography) are all in copyright, so
# there is no clean PD alternative. The `pagan_witchcraft` tradition
# stays unrepresented rather than misrepresented.
#
# The Diana/Aradia/Lucifer-as-light-bringer emanation pattern that
# Aradia was meant to surface is already in corpus via the Gospel of
# Philip and the Hermetica — cross-tradition coverage doesn't depend
# on this source.


