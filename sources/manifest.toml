# ANCIENT MESOPOTAMIAN (OPTIONAL)
# --------------------------------------------
# The deepest ancient layer. Pre-dates everything else in the corpus.
# Lower priority for initial expansion but worth including for the
# substrate perspective on soul-as-traveler and cosmic combat myths.

[[source]]
id = "descent-of-inanna"
tradition = "mesopotamian"
