# --------------------------------------------
# EGYPTIAN
# --------------------------------------------
# Ancient substrate. The language of soul-as-traveler and cosmic
# justice that propagates through Hermeticism (Egyptian-Greek in origin)
# and has clear structural parallels with Tibetan Bardo Thodol
# (both are psychopomp/afterlife navigation texts).

[[source]]
