format = "html_multi"
license = "public_domain"
translator = "E.A. Wallis Budge"
notes = "Budge's translation of the Papyrus of Ani and related funerary texts. Index page links to chapters/hymns. Budge's scholarship is dated (he favored diffusionist readings that modern Egyptology rejects) but the translation itself remains the most accessible PD version."

